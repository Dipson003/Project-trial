<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWeb | Unified Capital Framework</title>
    
    <!-- Stable High-Availability React & Babel Components -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-color: #f8fafc;
            --surface-white: #ffffff;
            --primary-green: #059669;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-line: #e2e8f0;
            --accent-orange: #ea580c;
        }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--text-dark); 
            background-color: var(--bg-color); 
            -webkit-font-smoothing: antialiased; 
            overflow-x: hidden;
        }

        /* Fixed Premium Header Spacing */
        .main-header { 
            height: 85px; 
            background: var(--surface-white); 
            border-bottom: 1px solid var(--border-line); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 2rem; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .brand-logo { display: flex; align-items: center; gap: 0.75rem; cursor: pointer; margin-right: 2rem; }
        .logo-box { width: 40px; height: 40px; background: var(--primary-green); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 1.25rem; }
        .brand-name { font-weight: 800; font-size: 1.25rem; color: var(--text-dark); letter-spacing: -0.03em; }
        
        /* Generous link separation to fix jam-packed screenshot display issues */
        .desktop-nav { display: none; gap: 2.5rem; align-items: center; margin-right: auto; padding-left: 1rem; }
        .nav-link { color: var(--text-dark); text-decoration: none; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: color 0.2s; display: flex; align-items: center; gap: 0.4rem; }
        .nav-link:hover { color: var(--primary-green); }
        
        .header-buttons { display: flex; gap: 1.2rem; align-items: center; }
        .menu-toggle { background: none; border: none; font-size: 1.6rem; cursor: pointer; color: var(--text-dark); padding: 0.2rem; display: flex; align-items: center; justify-content: center; }
        
        @media(min-width: 950px) { .desktop-nav { display: flex; } }

        .action-btn { font-family: inherit; font-size: 0.85rem; font-weight: 700; padding: 0.6rem 1.2rem; border-radius: 10px; cursor: pointer; border: none; transition: all 0.2s; }
        .btn-outline { color: var(--primary-green); background: rgba(5, 150, 105, 0.06); border: 1px solid var(--primary-green); }
        .btn-solid { background: var(--primary-green); color: white; }
        .btn-solid:hover { background: #047857; transform: translateY(-1px); }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }

        /* Right-Sided Navigation Menu Drawer */
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; backdrop-filter: blur(2px); }
        .right-drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 300px; background: white; z-index: 1600; padding: 2.5rem 2rem; display: flex; flex-direction: column; gap: 1.5rem; box-shadow: -5px 0 25px rgba(0,0,0,0.15); transform: translateX(100%); transition: transform 0.3s ease-out; }
        .right-drawer.open { transform: translateX(0); }

        /* Hero Layout with Motion Pan Background */
        .hero-banner { position: relative; padding: 7rem 1.5rem; text-align: center; overflow: hidden; margin-bottom: 2rem; background-color: #0f172a; }
        .hero-motion-bg { 
            position: absolute; inset: 0; 
            background-image: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-position: center;
            opacity: 0.35;
        }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(15, 23, 42, 0.9)); }
        .hero-content { position: relative; z-index: 1; }
        .hero-headline { font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; line-height: 1.2; color: white; letter-spacing: -0.02em; }
        .hero-headline span { color: #34d399; }
        
        /* Slider Components */
        .slider-wrapper { max-width: 600px; margin: 0 auto 3rem; padding: 0 1.2rem; }
        .slider-container { width: 100%; height: 260px; border-radius: 24px; overflow: hidden; position: relative; border: 1px solid var(--border-line); box-shadow: 0 12px 30px rgba(0,0,0,0.06); }
        .slider-track { display: flex; width: 100%; height: 100%; transition: transform 0.6s ease-in-out; }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.85)); padding: 2.5rem 1.5rem 1.5rem; color: white; font-weight: 700; font-size: 1.1rem; }

        /* Catalog Layout */
        .catalog-grid { padding: 0 1.2rem; display: flex; flex-direction: column; gap: 1.8rem; margin-bottom: 4rem; max-width: 600px; margin-left: auto; margin-right: auto; }
        .product-card { background: white; border-radius: 24px; border: 1px solid var(--border-line); overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .img-box { width: 100%; height: 200px; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 1rem; right: 1rem; background: white; padding: 0.45rem 0.9rem; border-radius: 50px; font-weight: 800; font-size: 0.75rem; color: var(--primary-green); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card-body { padding: 1.5rem; }
        .card-body h3 { font-size: 1.25rem; font-weight: 700; color: var(--text-dark); }
        .read-more { width: 100%; padding: 0.9rem; margin-top: 1.2rem; border: 1px solid var(--border-line); border-radius: 12px; background: #f8fafc; font-weight: 700; cursor: pointer; color: var(--text-dark); transition: all 0.2s; }
        .read-more:hover { background: var(--primary-green); color: white; border-color: var(--primary-green); }

        /* General Containers */
        .page-container { padding: 2.5rem 1.2rem; max-width: 600px; margin: 0 auto; min-height: 80vh; }
        .info-header { font-size: 0.75rem; font-weight: 800; color: var(--primary-green); letter-spacing: 0.05em; margin-bottom: 0.5rem; display: block; text-transform: uppercase; }
        .content-block { line-height: 1.7; color: #334155; margin-bottom: 1.2rem; font-size: 0.95rem; }
        .metric-box { background: #f1f5f9; padding: 1.2rem; border-radius: 16px; margin-bottom: 2rem; }

        /* Premium Investment Form Layouts */
        .premium-investment-card { background: white; border-radius: 28px; border: 1px solid var(--border-line); padding: 2.2rem 1.8rem; box-shadow: 0 15px 35px rgba(15, 23, 42, 0.04); margin-top: 1.5rem; }
        .asset-summary-banner { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: white; padding: 1.2rem 1.5rem; border-radius: 16px; margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center; }
        .investment-input-group { margin-bottom: 1.2rem; position: relative; }
        .investment-label { display: block; font-size: 0.8rem; font-weight: 700; color: #334155; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.03em; }
        .investment-input { width: 100%; padding: 1rem 1.2rem; border: 2px solid #e2e8f0; border-radius: 14px; font-family: inherit; font-size: 1rem; font-weight: 600; color: var(--text-dark); background: #f8fafc; transition: all 0.2s; }
        .investment-input:focus { border-color: var(--primary-green); outline: none; background: white; }
        .investment-input:disabled { background: #f1f5f9; color: #94a3b8; border-color: #e2e8f0; cursor: not-allowed; }
        .premium-terms-box { border: 1px solid #cbd5e1; border-radius: 14px; padding: 1.1rem; background: #f8fafc; height: 110px; overflow-y: auto; font-size: 0.8rem; color: #475569; line-height: 1.6; margin-bottom: 1.2rem; }
        .checkbox-label { display: flex; align-items: flex-start; gap: 0.75rem; font-size: 0.85rem; font-weight: 600; color: #334155; cursor: pointer; user-select: none; line-height: 1.4; }
        .checkbox-label input { width: 18px; height: 18px; accent-color: var(--primary-green); margin-top: 0.1rem; }

        /* Dashboard UI Elements */
        .naira-card { background: linear-gradient(135deg, #064e3b 0%, #047857 100%); color: white; border-radius: 24px; padding: 1.8rem; margin-bottom: 1.5rem; box-shadow: 0 12px 24px rgba(5, 150, 105, 0.15); }
        .dash-row { background: white; padding: 1.2rem; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.9rem; border: 1px solid var(--border-line); transition: all 0.2s; }
        .bonus-card { background: rgba(16, 185, 129, 0.08); border: 1px dashed var(--primary-green); padding: 1.5rem; border-radius: 18px; text-align: center; margin-bottom: 2rem; }
        
        .history-box { background: white; border: 1px solid var(--border-line); border-radius: 20px; padding: 1.5rem; margin-top: 2.5rem; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 0.9rem 0; border-bottom: 1px solid #f1f5f9; font-size: 0.88rem; }
        .badge-status { padding: 0.3rem 0.7rem; border-radius: 50px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .status-pending { background: #fef3c7; color: #d97706; }
        .status-success { background: #d1fae5; color: #059669; }

        /* Modals Setup */
        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 1rem; overflow-y: auto; }
        .modal-card { background: white; width: 100%; max-width: 440px; padding: 2.2rem; border-radius: 26px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.15); margin: auto; }
        .close-btn { position: absolute; top: 1.2rem; right: 1.2rem; border: none; background: #f1f5f9; width: 32px; height: 32px; border-radius: 50%; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .input-field { width: 100%; padding: 1rem; border: 1px solid #cbd5e1; border-radius: 12px; margin-bottom: 1rem; font-family: inherit; font-size: 0.95rem; font-weight: 500; background: #f8fafc; }
        .input-field:focus { border-color: var(--primary-green); outline: none; background: white; }
        
        .submit-btn { width: 100%; padding: 1.1rem; background: var(--primary-green); color: white; border: none; border-radius: 14px; font-weight: 700; font-size: 0.95rem; cursor: pointer; margin-top: 0.5rem; transition: all 0.2s; }
        .submit-btn:hover { background: #047857; }
        .code-inputs { display: flex; gap: 0.6rem; justify-content: center; margin-bottom: 1.5rem; }
        .code-box { width: 48px; height: 52px; border: 2px solid #cbd5e1; border-radius: 10px; text-align: center; font-size: 1.3rem; font-weight: 700; }

        .btn-group { display: flex; gap: 1.2rem; margin-top: 1.8rem; }
        .half-btn { flex: 1; padding: 1.1rem; border-radius: 14px; border: none; font-weight: 700; font-size: 0.95rem; cursor: pointer; }

        /* Error/Alert Banners */
        .error-banner { background: #fee2e2; color: #dc2626; padding: 1rem; border-radius: 12px; font-weight: 700; font-size: 0.88rem; text-align: center; margin-top: 0.8rem; margin-bottom: 0.8rem; border: 1px solid #fca5a5; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .premium-alert { text-align: center; }
        .premium-alert .icon-box { width: 75px; height: 75px; border-radius: 50%; background: rgba(16, 185, 129, 0.1); color: var(--primary-green); font-size: 2.2rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
        
        footer { background: #020617; color: #94a3b8; padding: 3.5rem 1.2rem; text-align: center; border-top: 1px solid #1e293b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const formatNaira = (num) => "₦" + (num || 0).toLocaleString("en-NG", { minimumFractionDigits: 2 });

        function App() {
            const [view, setView] = useState('home');
            const [modal, setModal] = useState(null);
            const [user, setUser] = useState(null);
            const [menuOpen, setMenuOpen] = useState(false);
            const [slideIdx, setSlideIdx] = useState(0);
            const [alertData, setAlertData] = useState(null);
            const [activePlan, setActivePlan] = useState(null);

            // Allocation Inputs
            const [investAmount, setInvestAmount] = useState('');
            const [termsAgreed, setTermsAgreed] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');

            // Registration Form Secure Elements
            const [regName, setRegName] = useState('');
            const [regEmail, setRegEmail] = useState('');
            const [regPassword, setRegPassword] = useState('');
            const [regConfirmPassword, setRegConfirmPassword] = useState('');
            const [regAgreed, setRegAgreed] = useState(false);

            // Wallet Action Entries
            const [depositInput, setDepositInput] = useState('');
            const [withdrawInput, setWithdrawInput] = useState('');

            const [history, setHistory] = useState([
                { type: 'Welcome Bonus Credited', amount: 10000, date: 'Initial Setup', status: 'Successful' }
            ]);

            const slides = [
                { url: "https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&w=600", title: "Live Market Intelligence" },
                { url: "https://images.unsplash.com/photo-1582672060674-bc2bd808a8b5?auto=format&fit=crop&w=600", title: "Dubai Sovereign Real Estate" },
                { url: "https://images.unsplash.com/photo-1559136555-9303baea8ebd?auto=format&fit=crop&w=600", title: "Luxury Leisure Assets" }
            ];

            useEffect(() => {
                if (view === 'home') {
                    const timer = setInterval(() => setSlideIdx(p => (p + 1) % slides.length), 3000);
                    return () => clearInterval(timer);
                }
            }, [view]);

            const navigate = (v) => { setView(v); setMenuOpen(false); window.scrollTo(0,0); };
            const triggerAlert = (title, message, icon) => { setAlertData({ title, message, icon }); };

            const handleLogin = () => { 
                setUser({ name: 'Ijaola Oluwatosin', email: 'ijaola@worldweb.io', balance: 250000, bonusClaimed: true }); 
                setModal(null); setView('dashboard'); 
            };
            
            const handleSignupSubmit = () => { 
                setErrorMsg('');
                if (!regName || !regEmail || !regPassword || !regConfirmPassword) {
                    setErrorMsg('All registration entry segments are strictly required.');
                    return;
                }
                if (regPassword !== regConfirmPassword) {
                    setErrorMsg('Security matching mismatch: Passwords do not align.');
                    return;
                }
                if (regPassword.length < 6) {
                    setErrorMsg('Security threshold failed: Password must be at least 6 characters.');
                    return;
                }
                if (!regAgreed) {
                    setErrorMsg('You must agree to the data protection system architecture rules.');
                    return;
                }
                setErrorMsg('');
                setModal('verification'); 
            };

            const handleVerificationComplete = () => { 
                setUser({ name: regName || 'Ijaola Oluwatosin', email: regEmail || 'ijaola@worldweb.io', balance: 0, bonusClaimed: false }); 
                setModal(null); setView('dashboard'); 
            };

            const logout = () => { setUser(null); setView('home'); };

            const claimBonus = () => {
                setUser(prev => ({ ...prev, balance: prev.balance + 10000, bonusClaimed: true }));
                setHistory(prev => [{ type: 'Welcome Bonus', amount: 10000, date: 'Just now', status: 'Successful' }, ...prev]);
                triggerAlert('Bonus Claimed!', 'Congratulations! ₦10,000 Welcome Bonus has been credited.', '🎁');
            };

            const submitDeposit = () => {
                const amt = Number(depositInput);
                if (!amt || amt <= 0) return;
                setUser(prev => ({ ...prev, balance: prev.balance + amt }));
                setHistory(prev => [{ type: 'Capital Deposit', amount: amt, date: 'Just now', status: 'Successful' }, ...prev]);
                setDepositInput('');
                triggerAlert('Deposit Confirmed', `System credited ${formatNaira(amt)} to your wallet balance.`, '💰');
                navigate('dashboard');
            };

            const submitWithdrawal = () => {
                const amt = Number(withdrawInput);
                if (!amt || amt <= 0) return;
                if (amt > user.balance) {
                    triggerAlert('Insufficient Balance', 'You do not have enough liquidity available to execute this withdrawal.', '❌');
                    return;
                }
                setUser(prev => ({ ...prev, balance: prev.balance - amt }));
                setHistory(prev => [{ type: 'Liquidity Withdrawal', amount: amt, date: 'Processing Routing', status: 'Pending' }, ...prev]);
                setWithdrawInput('');
                triggerAlert('Withdrawal Initiated', `Your processing transaction for ${formatNaira(amt)} is on the way!`, '✅');
                navigate('dashboard');
            };

            const openInvestmentPage = (planKey) => {
                if (!user) { setModal('signup'); return; }
                setActivePlan(planKey);
                setInvestAmount('');
                setTermsAgreed(false);
                setErrorMsg('');
                navigate('invest-form');
            };

            const executeInvestmentSubmit = () => {
                setErrorMsg('');
                const amt = Number(investAmount);
                if (!amt || amt <= 0) { setErrorMsg('Please enter a valid investment amount.'); return; }
                if (amt > user.balance) { setErrorMsg('Insufficient active wallet balance to fund this investment.'); return; }
                if (!termsAgreed) { setErrorMsg('You must review and accept the framework Terms and Conditions.'); return; }
                setModal('confirm-invest');
            };

            const acceptInvestment = () => {
                setModal(null);
                const amt = Number(investAmount);
                setUser(prev => ({ ...prev, balance: prev.balance - amt }));
                setHistory(prev => [{ type: `Invested: ${activePlan.toUpperCase()}`, amount: amt, date: 'Active Cycle', status: 'Successful' }, ...prev]);
                triggerAlert('Investment Activated', 'Thank you for trusting us, we will verify your deposit and update, kindly exercise patience.', '🛡️');
                navigate('dashboard');
            };

            return (
                <div>
                    {/* SPACED MAIN HEADER CONTAINER */}
                    <header className="main-header">
                        <div className="brand-logo" onClick={() => navigate(user ? 'dashboard' : 'home')}>
                            <div className="logo-box">W</div>
                            <span className="brand-name">WorldWeb</span>
                        </div>

                        <nav className="desktop-nav">
                            <span className="nav-link" onClick={() => navigate('home')}>Home</span>
                            <span className="nav-link" onClick={() => navigate('about')}>About Us</span>
                            <span className="nav-link" onClick={() => navigate('terms')}>Terms & Conditions</span>
                        </nav>

                        <div className="header-buttons">
                            {!user ? (
                                <>
                                    <button className="action-btn btn-outline" onClick={() => { setErrorMsg(''); setModal('login'); }}>Sign In</button>
                                    <button className="action-btn btn-solid" onClick={() => { setErrorMsg(''); setModal('signup'); }}>Get Started</button>
                                </>
                            ) : (
                                <button className="action-btn btn-solid" onClick={() => navigate('dashboard')}>Dashboard</button>
                            )}
                            <button className="menu-toggle" onClick={() => setMenuOpen(true)}>☰</button>
                        </div>
                    </header>

                    {/* RIGHT-SIDED STYLED SLIDE MENU DRAWER */}
                    {menuOpen && <div className="drawer-overlay" onClick={() => setMenuOpen(false)}></div>}
                    <div className={`right-drawer ${menuOpen ? 'open' : ''}`}>
                        <button className="close-btn" onClick={() => setMenuOpen(false)}>×</button>
                        <div className="brand-logo" style={{marginBottom:'1rem'}}>
                            <div className="logo-box">W</div>
                            <span className="brand-name">WorldWeb</span>
                        </div>
                        <span className="nav-link" onClick={() => navigate('home')}>🏠 Home</span>
                        <span className="nav-link" onClick={() => navigate('about')}>ℹ️ About Us</span>
                        <span className="nav-link" onClick={() => navigate('terms')}>📋 Our Terms</span>
                        <hr style={{borderColor:'#f1f5f9'}}/>
                        {user ? (
                            <>
                                <span className="nav-link" style={{color:'var(--primary-green)'}} onClick={() => navigate('dashboard')}>💼 My Dashboard</span>
                                <span className="nav-link" style={{color:'#ef4444'}} onClick={logout}>🚪 Log Out</span>
                            </>
                        ) : (
                            <span className="nav-link" onClick={() => { setMenuOpen(false); setErrorMsg(''); setModal('login'); }}>Sign In</span>
                        )}
                    </div>

                    {/* HOME PAGE MAIN INTERFACE ROUTE */}
                    {view === 'home' && (
                        <main>
                            <section className="hero-banner">
                                <div className="hero-motion-bg"></div>
                                <div className="hero-overlay"></div>
                                <div className="hero-content">
                                    <h1 className="hero-headline">Multiply Capital Through<br/><span>Proven Portfolios</span></h1>
                                    <button className="action-btn btn-solid" style={{padding:'1rem 2.5rem', fontSize:'0.9rem', marginTop:'1rem'}} onClick={() => { setErrorMsg(''); setModal('signup'); }}>Start Investing Today</button>
                                </div>
                            </section>

                            <div className="slider-wrapper">
                                <div className="slider-container">
                                    <div className="slider-track" style={{ transform: `translateX(-${slideIdx * 100}%)` }}>
                                        {slides.map((s, i) => (
                                            <div className="slide" key={i}>
                                                <img src={s.url} alt={s.title} />
                                                <div className="slide-overlay">{s.title}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="catalog-grid">
                                <div className="product-card">
                                    <div className="img-box"><img src="https://images.unsplash.com/photo-1592982537447-7440770cbfc9?auto=format&fit=crop&w=600" /><div className="badge">7% ROI • 3 Mos</div></div>
                                    <div className="card-body"><h3>Agriculture Asset Matrix</h3><button className="read-more" onClick={() => navigate('agric')}>Read More Details →</button></div>
                                </div>
                                <div className="product-card">
                                    <div className="img-box"><img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=600" /><div className="badge">10% ROI • 3 Mos</div></div>
                                    <div className="card-body"><h3>Prime Real Estate Assets</h3><button className="read-more" onClick={() => navigate('estate')}>Read More Details →</button></div>
                                </div>
                                <div className="product-card">
                                    <div className="img-box"><img src="https://images.unsplash.com/photo-1621416894569-0f39ed31d247?auto=format&fit=crop&w=600" /><div className="badge">13% ROI • 3 Mos</div></div>
                                    <div className="card-body"><h3>BTC Digital Growth</h3><button className="read-more" onClick={() => navigate('btc')}>Read More Details →</button></div>
