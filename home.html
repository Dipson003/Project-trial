<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWeb | Unified Capital</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            color: #0f172a; 
            overflow-x: hidden;
        }

        /* Fixed Navigation Spacing */
        .header { 
            height: 80px; 
            background: white; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 40px; 
            border-bottom: 1px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-links { display: flex; gap: 40px; align-items: center; }
        .nav-item { font-weight: 600; color: #0f172a; cursor: pointer; text-decoration: none; }
        .nav-item:hover { color: #059669; }

        /* Right Sided Menu */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: 0;
            height: 100%;
            width: 300px;
            background: white;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            z-index: 1000;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            transform: translateX(100%);
            transition: 0.3s ease;
        }
        .mobile-menu.open { transform: translateX(0); }

        /* Investment Page Styling - Furnished */
        .invest-container { max-width: 600px; margin: 40px auto; padding: 20px; }
        .invest-card { 
            background: white; 
            border-radius: 24px; 
            padding: 30px; 
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .asset-box {
            background: #0f172a;
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
        }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; font-weight: 800; margin-bottom: 8px; color: #64748b; }
        .input-field { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #f1f5f9; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 600;
        }
        .terms-box {
            height: 100px;
            overflow-y: auto;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 15px;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* Dashboard & Balance */
        .balance-card {
            background: linear-gradient(135deg, #059669, #047857);
            color: white;
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 30px;
        }
        .btn { 
            padding: 12px 24px; 
            border-radius: 10px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none;
            transition: 0.2s;
        }
        .btn-primary { background: #059669; color: white; width: 100%; }
        .btn-outline { background: white; color: #059669; border: 1px solid #059669; }

        .error-banner {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: 700;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const [page, setPage] = useState('home');
            const [user, setUser] = useState(null);
            const [menuOpen, setMenuOpen] = useState(false);
            const [amount, setAmount] = useState('');
            const [activePlan, setActivePlan] = useState('');
            const [error, setError] = useState('');

            // Balance Logic
            const handleDeposit = () => {
                const val = parseFloat(amount);
                if(val > 0) {
                    setUser({...user, balance: user.balance + val});
                    setAmount('');
                    setPage('dashboard');
                    alert("Deposit added to balance!");
                }
            };

            const handleWithdraw = () => {
                const val = parseFloat(amount);
                if(val > 0 && val <= user.balance) {
                    setUser({...user, balance: user.balance - val});
                    setAmount('');
                    setPage('dashboard');
                    alert("Withdrawal subtracted from balance!");
                } else {
                    alert("Insufficient funds");
                }
            };

            const finalizeInvestment = () => {
                const val = parseFloat(amount);
                if(val > 0 && val <= user.balance) {
                    setUser({...user, balance: user.balance - val});
                    alert("Thank you for trusting us, we will verify your deposit and update, kindly exercise patience");
                    setPage('dashboard');
                } else {
                    setError("Insufficient balance to invest");
                }
            };

            return (
                <div>
                    {/* Header */}
                    <div className="header">
                        <div style={{fontWeight:800, fontSize:22, color:'#059669'}} onClick={() => setPage('home')}>WorldWeb</div>
                        <div className="nav-links">
                            <div className="nav-item" onClick={() => setPage('home')}>Home</div>
                            <div className="nav-item" onClick={() => setPage('about')}>About</div>
                            <div className="nav-item" onClick={() => setPage('terms')}>Terms</div>
                        </div>
                        <div>
                            {user ? (
                                <button className="btn btn-outline" onClick={() => setPage('dashboard')}>Dashboard</button>
                            ) : (
                                <button className="btn btn-primary" onClick={() => setUser({name: 'Ijaola', balance: 50000})}>Login</button>
                            )}
                            <button style={{marginLeft:15, background:'none', border:'none', fontSize:24, cursor:'pointer'}} onClick={() => setMenuOpen(true)}>☰</button>
                        </div>
                    </div>

                    {/* Right Menu */}
                    <div className={`mobile-menu ${menuOpen ? 'open' : ''}`}>
                        <div style={{textAlign:'right', fontSize:24, cursor:'pointer'}} onClick={() => setMenuOpen(false)}>×</div>
                        <div className="nav-item" onClick={() => {setPage('home'); setMenuOpen(false)}}>🏠 Home</div>
                        <div className="nav-item" onClick={() => {setPage('dashboard'); setMenuOpen(false)}}>💼 Dashboard</div>
                        <div className="nav-item" onClick={() => {setPage('about'); setMenuOpen(false)}}>ℹ️ About</div>
                        <hr/>
                        <div className="nav-item" style={{color:'red'}} onClick={() => {setUser(null); setPage('home'); setMenuOpen(false)}}>Logout</div>
                    </div>

                    {/* Pages */}
                    {page === 'home' && (
                        <div style={{textAlign:'center', padding:100}}>
                            <h1>Multiply Your Capital</h1>
                            <p style={{margin:'20px 0', color:'#64748b'}}>Secure investment portfolios for the modern era.</p>
                            <button className="btn btn-primary" style={{width:'auto'}} onClick={() => {setActivePlan('Agric Matrix'); setPage('invest');}}>Start Investing</button>
                        </div>
                    )}

                    {page === 'dashboard' && user && (
                        <div style={{maxWidth:600, margin:'40px auto', padding:20}}>
                            <div className="balance-card">
                                <p style={{opacity:0.8, fontSize:14, fontWeight:600}}>CURRENT BALANCE</p>
                                <h1 style={{fontSize:42}}>₦{user.balance.toLocaleString()}</h1>
                            </div>
                            <div style={{display:'flex', gap:15}}>
                                <button className="btn btn-primary" onClick={() => setPage('deposit')}>Deposit</button>
                                <button className="btn btn-outline" onClick={() => setPage('withdraw')}>Withdraw</button>
                            </div>
                        </div>
                    )}

                    {page === 'deposit' && (
                        <div className="invest-container">
                            <h2>Deposit Funds</h2>
                            <input className="input-field" type="number" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="Amount to add" style={{marginTop:20}} />
                            <button className="btn btn-primary" style={{marginTop:20}} onClick={handleDeposit}>Confirm Deposit</button>
                        </div>
                    )}

                    {page === 'withdraw' && (
                        <div className="invest-container">
                            <h2>Withdraw Funds</h2>
                            <input className="input-field" type="number" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="Amount to subtract" style={{marginTop:20}} />
                            <button className="btn btn-primary" style={{marginTop:20}} onClick={handleWithdraw}>Request Withdrawal</button>
                        </div>
                    )}

                    {page === 'invest' && user && (
                        <div className="invest-container">
                            <div className="invest-card">
                                <div className="asset-box">
                                    <div>
                                        <p style={{fontSize:10, opacity:0.7}}>ASSET CLASS</p>
                                        <p style={{fontWeight:800}}>{activePlan}</p>
                                    </div>
                                    <div style={{textAlign:'right'}}>
                                        <p style={{fontSize:10, opacity:0.7}}>AVAILABLE</p>
                                        <p style={{fontWeight:800}}>₦{user.balance.toLocaleString()}</p>
                                    </div>
                                </div>
                                <div className="input-group">
                                    <label>INVESTMENT AMOUNT (₦)</label>
                                    <input className="input-field" type="number" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="50,000" />
                                </div>
                                <div className="terms-box">
                                    This capital allocation is subject to a 3-month lock-in period. ROI is calculated daily. By clicking proceed, you agree to the WorldWeb asset management framework.
                                </div>
                                <button className="btn btn-primary" onClick={finalizeInvestment}>Complete Investment</button>
                                {error && <div className="error-banner">sorry ❌ {error}</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
