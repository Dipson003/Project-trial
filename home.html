<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWeb | Unified Capital Framework</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-color: #f8fafc;
            --primary-green: #059669;
            --text-dark: #0f172a;
            --border-line: #e2e8f0;
            --accent-orange: #ea580c;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-dark); background-color: var(--bg-color); }

        .main-header { height: 70px; background: white; border-bottom: 1px solid var(--border-line); display: flex; align-items: center; justify-content: space-between; padding: 0 1.2rem; position: sticky; top: 0; z-index: 1000; }
        .logo-box { width: 36px; height: 36px; background: var(--primary-green); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; }
        .hero-banner { padding: 4rem 1.2rem; text-align: center; }
        .catalog-grid { padding: 0 1.2rem; display: flex; flex-direction: column; gap: 1.5rem; }
        .product-card { background: white; border-radius: 24px; border: 1px solid var(--border-line); overflow: hidden; }
        .img-box { width: 100%; height: 190px; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 1rem; right: 1rem; background: white; padding: 0.4rem 0.8rem; border-radius: 50px; font-weight: 800; font-size: 0.7rem; color: var(--primary-green); }
        .read-more { width: 100%; padding: 0.8rem; margin-top: 1rem; border: 1px solid var(--border-line); background: #f8fafc; font-weight: 700; cursor: pointer; }
        
        .market-section { background: #0f172a; padding: 3rem 1.2rem; margin-top: 3rem; color: white; }
        .chart-box { border-radius: 16px; overflow: hidden; margin-top: 2rem; height: 400px; }
        
        .detail-view { padding: 2rem 1.2rem; max-width: 600px; margin: 0 auto; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 1rem; }
        .modal-card { background: white; width: 100%; max-width: 400px; padding: 2rem; border-radius: 24px; position: relative; }
        .submit-btn { width: 100%; padding: 1rem; background: var(--primary-green); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('home');
            const [modal, setModal] = useState(null);

            useEffect(() => {
                if (view === 'home' && window.TradingView) {
                    new window.TradingView.MediumWidget({
                        "symbols": [["BTC", "BINANCE:BTCUSDT|1D"], ["Gold", "OANDA:XAUUSD|1D"], ["USD/NGN", "FX_IDC:USDNGN|1D"]],
                        "width": "100%", "height": 400, "colorTheme": "dark", "container_id": "chart_div"
                    });
                }
            }, [view]);

            return (
                <div>
                    <header className="main-header">
                        <div className="logo-box" onClick={() => setView('home')}>W</div>
                        <div style={{display:'flex', gap:'0.5rem'}}>
                            <button className="read-more" style={{width:'auto'}} onClick={() => setModal('login')}>Sign In</button>
                        </div>
                    </header>

                    {view === 'home' && (
                        <main>
                            <section className="hero-banner">
                                <h1>Multiply Wealth Through <span>Proven Portfolios</span></h1>
                            </section>

                            <div className="catalog-grid">
                                <div className="product-card">
                                    <div className="img-box"><img src="https://images.unsplash.com/photo-1592982537447-7440770cbfc9?auto=format&fit=crop&w=600" /><div className="badge">7% ROI</div></div>
                                    <div style={{padding:'1.5rem'}}><h3>Agriculture Matrix</h3><button className="read-more" onClick={() => setView('agric')}>Read More</button></div>
                                </div>
                                <div className="product-card">
                                    <div className="img-box"><img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=600" /><div className="badge">11% ROI</div></div>
                                    <div style={{padding:'1.5rem'}}><h3>Real Estate Assets</h3><button className="read-more" onClick={() => setView('estate')}>Read More</button></div>
                                </div>
                                <div className="product-card">
                                    <div className="img-box"><img src="https://images.unsplash.com/photo-1621416894569-0f39ed31d247?auto=format&fit=crop&w=600" /><div className="badge" style={{color:'var(--accent-orange)'}}>13% ROI</div></div>
                                    <div style={{padding:'1.5rem'}}><h3>BTC Digital Growth</h3><button className="read-more" onClick={() => setView('btc')}>Read More</button></div>
                                </div>
                            </div>

                            <section className="market-section">
                                <h2 style={{textAlign:'center'}}>Live Market Intelligence</h2>
                                <div id="chart_div" className="chart-box"></div>
                            </section>
                        </main>
                    )}

                    {/* DETAIL VIEWS */}
                    {(view === 'agric' || view === 'estate' || view === 'btc') && (
                        <div className="detail-view">
                            <span onClick={() => setView('home')} style={{color:'var(--primary-green)', cursor:'pointer'}}>← Back</span>
                            <h2 style={{margin:'1rem 0'}}>Detailed Investment Profile</h2>
                            <p style={{lineHeight:1.7}}>Our proprietary investment models are designed for institutional-grade reliability. Whether through mechanized agriculture, urban land-banking, or high-frequency digital arbitrage, we focus on principal protection and fixed yield targets.</p>
                            <button className="submit-btn" style={{marginTop:'2rem'}} onClick={() => setModal('signup')}>Invest Now</button>
                        </div>
                    )}

                    {modal && (
                        <div className="modal-overlay">
                            <div className="modal-card">
                                <button style={{position:'absolute', right:'1rem', top:'1rem', border:'none', background:'none', fontSize:'1.5rem'}} onClick={() => setModal(null)}>×</button>
                                <h2>{modal === 'login' ? 'Sign In' : 'Join WorldWeb'}</h2>
                                <input className="submit-btn" style={{background:'#f1f5f9', color:'black', margin:'1rem 0'}} placeholder="Email" />
                                <button className="submit-btn" onClick={() => setModal(null)}>Continue</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
