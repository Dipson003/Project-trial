<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWeb | Unified Capital Framework</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-color: #f8fafc;
            --surface-white: #ffffff;
            --primary-green: #059669;
            --dark-green: #047857;
            --light-green-alpha: rgba(5, 150, 105, 0.06);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-line: #e2e8f0;
            --accent-amber: #d97706;
            --accent-orange: #ea580c;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-dark); background-color: var(--bg-color); -webkit-font-smoothing: antialiased; }

        /* Header */
        .main-header { height: 70px; background: var(--surface-white); border-bottom: 1px solid var(--border-line); display: flex; align-items: center; justify-content: space-between; padding: 0 1.2rem; position: sticky; top: 0; z-index: 1000; }
        .brand-logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; cursor: pointer; }
        .logo-box { width: 36px; height: 36px; background: var(--primary-green); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 1.15rem; }
        .brand-name { font-weight: 800; font-size: 1.15rem; color: var(--text-dark); letter-spacing: -0.03em; }
        .header-buttons { display: flex; gap: 0.5rem; }
        .action-btn { font-family: inherit; font-size: 0.8rem; font-weight: 700; padding: 0.5rem 0.9rem; border-radius: 8px; cursor: pointer; border: none; }
        .btn-outline { color: var(--primary-green); background: var(--light-green-alpha); border: 1px solid var(--primary-green); }
        .btn-solid { background: var(--primary-green); color: white; }
        .btn-danger { background: #ef4444; color: white; }

        /* Hero */
        .hero-banner { padding: 4rem 1.2rem 2rem; background: linear-gradient(180deg, var(--light-green-alpha) 0%, rgba(248,250,252,0) 100%); text-align: center; }
        .hero-headline { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; }
        .hero-headline span { color: var(--primary-green); }

        /* Slider */
        .slider-wrapper { max-width: 550px; margin: 0 auto 3rem; padding: 0 1.2rem; }
        .slider-container { width: 100%; height: 250px; border-radius: 20px; overflow: hidden; position: relative; border: 1px solid var(--border-line); }
        .slider-track { display: flex; width: 100%; height: 100%; transition: transform 0.6s ease-in-out; }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 2rem 1rem 1rem; color: white; font-weight: 700; }

        /* Catalog */
        .catalog-grid { padding: 0 1.2rem; display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 4rem; }
        .product-card { background: white; border-radius: 24px; border: 1px solid var(--border-line); overflow: hidden; cursor: pointer; }
        .img-box { width: 100%; height: 200px; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 1rem; right: 1rem; background: white; padding: 0.4rem 0.8rem; border-radius: 50px; font-weight: 800; font-size: 0.75rem; color: var(--primary-green); }
        .card-body { padding: 1.5rem; }
        .read-more { width: 100%; padding: 0.8rem; margin-top: 1rem; border: 1px solid var(--border-line); border-radius: 10px; background: #f8fafc; font-weight: 700; cursor: pointer; }

        /* Market Charts */
        .market-section { background: #0f172a; padding: 3rem 1.2rem; color: white; }
        .chart-box { border-radius: 16px; overflow: hidden; margin-top: 2rem; }

        /* Dashboard */
        .portal-layout { padding: 1.2rem; max-width: 600px; margin: 0 auto; min-height: 80vh; }
        .naira-card { background: linear-gradient(135deg, #064e3b 0%, #047857 100%); color: white; border-radius: 20px; padding: 1.5rem; margin-bottom: 2rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .dashboard-row { background: white; padding: 1.1rem; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; border: 1px solid var(--border-line); }

        /* Auth */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 1rem; }
        .modal-card { background: white; width: 100%; max-width: 400px; padding: 2rem; border-radius: 24px; position: relative; }
        .close-btn { position: absolute; top: 1rem; right: 1rem; border: none; background: #f1f5f9; width: 30px; height: 30px; border-radius: 50%; font-weight: 800; cursor: pointer; }
        .input-field { width: 100%; padding: 0.9rem; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 1rem; font-family: inherit; }
        .submit-btn { width: 100%; padding: 1rem; background: var(--primary-green); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }

        footer { background: #020617; color: #94a3b8; padding: 3rem 1.2rem; text-align: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const formatNaira = (num) => "₦" + (num || 0).toLocaleString("en-NG", { minimumFractionDigits: 2 });

        function App() {
            const [view, setView] = useState('home');
            const [modal, setModal] = useState(null);
            const [slideIdx, setSlideIdx] = useState(0);
            const [user, setUser] = useState(null);
            const [wallet, setWallet] = useState(250000);

            const slides = [
                { url: "https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&w=600", title: "Global Market USD Trends" },
                { url: "https://images.unsplash.com/photo-1582672060674-bc2bd808a8b5?auto=format&fit=crop&w=600", title: "Burj Khalifa Sovereign Assets" },
                { url: "https://images.unsplash.com/photo-1559136555-9303baea8ebd?auto=format&fit=crop&w=600", title: "Premium Leisure Jet Ski Portfolios" },
                { url: "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=600", title: "Luxury Residential Estates" }
            ];

            useEffect(() => {
                if (view === 'home') {
                    const timer = setInterval(() => setSlideIdx(p => (p + 1) % slides.length), 3000);
                    return () => clearInterval(timer);
                }
            }, [view]);

            useEffect(() => {
                if (view === 'home' && window.TradingView) {
                    new window.TradingView.MediumWidget({
                        "symbols": [["BTC", "BINANCE:BTCUSDT|1D"], ["Gold", "OANDA:XAUUSD|1D"], ["USD/NGN", "FX_IDC:USDNGN|1D"]],
                        "width": "100%", "height": 400, "colorTheme": "dark", "container_id": "chart_div"
                    });
                }
            }, [view]);

            const login = () => { setUser({name: 'Investor'}); setModal(null); setView('dashboard'); };
            const logout = () => { setUser(null); setView('home'); };

            return (
                <div>
                    <header className="main-header">
                        <div className="brand-logo" onClick={() => setView(user ? 'dashboard' : 'home')}>
                            <div className="logo-box">W</div>
                            <span className="brand-name">WorldWeb</span>
                        </div>
                        <div className="header-buttons">
                            {!user ? (
                                <>
                                    <button className="action-btn btn-outline" onClick={() => setModal('login')}>Sign In</button>
                                    <button className="action-btn btn-solid" onClick={() => setModal('signup')}>Get Started</button>
                                </>
                            ) : (
                                <button className="action-btn action-btn btn-danger" style={{border:'none', borderRadius:'8px', fontWeight:700, padding:'0.5rem 1rem'}} onClick={logout}>Log Out</button>
                            )}
                        </div>
                    </header>

                    {view === 'home' && (
                        <main>
                            <section className="hero-banner">
                                <h1 className="hero-headline">Multiply Wealth Through <span>Proven Portfolios</span></h1>
                                <button className="action-btn btn-solid" style={{padding:'1rem 2rem'}} onClick={() => setModal('signup')}>Start Investing Today</button>
                            </section>

                            <div className="slider-wrapper">
                                <div className="slider-container">
                                    <div className="slider-track" style={{ transform: `translateX(-${slideIdx * 100}%)` }}>
                                        {slides.map((s, i) => (
                                            <div className="slide" key={i}>
                                                <img src={s.url} />
                                                <div className="slide-overlay">{s.title}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="catalog-grid">
                                <div className="product-card" onClick={() => setView('agric')}>
                                    <div className="img-box"><img src="https://images.unsplash.com/photo-1592982537447-7440770cbfc9?auto=format&fit=crop&w=600" /><div className="badge">7% ROI</div></div>
                                    <div className="card-body"><h3>Agriculture Asset Matrix</h3><button className="read-more">View Details</button></div>
                                </div>
                                <div className="product-card" onClick={() => setView('btc')}>
                                    <div className="img-box"><img src="https://images.unsplash.com/photo-1621416894569-0f39ed31d247?auto=format&fit=crop&w=600" /><div className="badge" style={{color:'var(--accent-orange)'}}>13% ROI</div></div>
                                    <div className="card-body"><h3>BTC Digital Growth</h3><button className="read-more">View Details</button></div>
                                </div>
                            </div>

                            <section className="market-section">
                                <h2 style={{textAlign:'center'}}>Live Market Intel</h2>
                                <div id="chart_div" className="chart-box"></div>
                            </section>
                        </main>
                    )}

                    {(view === 'agric' || view === 'btc') && (
                        <div style={{padding:'2rem 1.2rem', maxWidth:'600px', margin:'0 auto', minHeight:'80vh'}}>
                            <span onClick={() => setView(user ? 'dashboard' : 'home')} style={{color:'var(--primary-green)', fontWeight:800, cursor:'pointer'}}>← Back</span>
                            <h2 style={{marginTop:'1.5rem'}}>{view === 'agric' ? 'Agriculture Asset Matrix' : 'BTC Digital Growth'}</h2>
                            <p style={{margin:'1rem 0', lineHeight:1.7}}>Exclusive high-yield investment structures managed by WorldWeb capital. All underlying seed capital is corporate-insured to ensure principal protection.</p>
                            <button className="submit-btn" onClick={() => user ? setView('dashboard') : setModal('signup')}>
                                {user ? "Allocate Funds From Wallet" : "Sign Up to Invest"}
                            </button>
                        </div>
                    )}

                    {view === 'dashboard' && (
                        <div className="portal-layout">
                            <h2 style={{marginBottom:'1rem'}}>Welcome back, Investor</h2>
                            <div className="naira-card">
                                <div style={{fontSize:'0.8rem', opacity:0.8}}>WALLET BALANCE</div>
                                <div style={{fontSize:'2rem', fontWeight:800, margin:'0.5rem 0'}}>{formatNaira(wallet)}</div>
                                <div style={{display:'flex', gap:'1.5rem', borderTop:'1px solid rgba(255,255,255,0.2)', paddingTop:'1rem'}}>
                                    <div><small>STAKED</small><div>₦0.00</div></div>
                                    <div><small>TOTAL GAINS</small><div style={{color:'#34d399'}}>₦0.00</div></div>
                                </div>
                            </div>
                            <h3>Investment Marketplace</h3>
                            <div className="dashboard-row" onClick={() => setView('agric')}>
                                <div><strong>Agriculture Matrix</strong><div style={{fontSize:'0.8rem', color:'#64748b'}}>7% Fixed ROI</div></div>
                                <button className="action-btn btn-solid" style={{fontSize:'0.7rem'}}>Invest</button>
                            </div>
                            <div className="dashboard-row" onClick={() => setView('btc')}>
                                <div><strong>BTC Growth Plan</strong><div style={{fontSize:'0.8rem', color:'#64748b'}}>13% Fixed ROI</div></div>
                                <button className="action-btn btn-solid" style={{fontSize:'0.7rem', background:'var(--accent-orange)'}}>Invest</button>
                            </div>
                        </div>
                    )}

                    <footer>
                        <h3>WorldWeb</h3>
                        <p>© 2026 WorldWeb International Inc.</p>
                    </footer>

                    {modal && (
                        <div className="modal-overlay">
                            <div className="modal-card">
                                <button className="close-btn" onClick={() => setModal(null)}>×</button>
                                <h2 style={{marginBottom:'1rem'}}>{modal === 'login' ? 'Sign In' : 'Create Account'}</h2>
                                <input type="email" placeholder="Email" className="input-field" />
                                <input type="password" placeholder="Password" className="input-field" />
                                <button className="submit-btn" onClick={login}>Continue</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
