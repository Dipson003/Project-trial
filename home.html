<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWeb | Unified Capital Framework</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-color: #f8fafc;
            --surface-white: #ffffff;
            --primary-green: #059669;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-line: #e2e8f0;
            --accent-orange: #ea580c;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-dark); background-color: var(--bg-color); -webkit-font-smoothing: antialiased; }

        /* Header */
        .main-header { height: 70px; background: var(--surface-white); border-bottom: 1px solid var(--border-line); display: flex; align-items: center; justify-content: space-between; padding: 0 1.2rem; position: sticky; top: 0; z-index: 1000; }
        .logo-box { width: 36px; height: 36px; background: var(--primary-green); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 1.15rem; }
        .brand-name { font-weight: 800; font-size: 1.15rem; color: var(--text-dark); letter-spacing: -0.03em; margin-left: 0.5rem; }
        .header-buttons { display: flex; gap: 0.5rem; }
        .action-btn { font-family: inherit; font-size: 0.8rem; font-weight: 700; padding: 0.5rem 0.9rem; border-radius: 8px; cursor: pointer; border: none; }
        .btn-outline { color: var(--primary-green); background: rgba(5, 150, 105, 0.06); border: 1px solid var(--primary-green); }
        .btn-solid { background: var(--primary-green); color: white; }

        /* Hero */
        .hero-banner { padding: 4rem 1.2rem 2rem; background: linear-gradient(180deg, rgba(5, 150, 105, 0.06) 0%, rgba(248,250,252,0) 100%); text-align: center; }
        .hero-headline { font-size: 2rem; font-weight: 800; margin-bottom: 1rem; line-height: 1.2; }
        .hero-headline span { color: var(--primary-green); }

        /* Slider */
        .slider-wrapper { max-width: 550px; margin: 0 auto 3rem; padding: 0 1.2rem; }
        .slider-container { width: 100%; height: 250px; border-radius: 20px; overflow: hidden; position: relative; border: 1px solid var(--border-line); }
        .slider-track { display: flex; width: 100%; height: 100%; transition: transform 0.6s ease-in-out; }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 2rem 1rem 1rem; color: white; font-weight: 700; }

        /* Catalog */
        .catalog-grid { padding: 0 1.2rem; display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 4rem; }
        .product-card { background: white; border-radius: 24px; border: 1px solid var(--border-line); overflow: hidden; }
        .img-box { width: 100%; height: 190px; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 1rem; right: 1rem; background: white; padding: 0.4rem 0.8rem; border-radius: 50px; font-weight: 800; font-size: 0.7rem; color: var(--primary-green); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card-body { padding: 1.5rem; }
        .read-more { width: 100%; padding: 0.8rem; margin-top: 1rem; border: 1px solid var(--border-line); border-radius: 10px; background: #f8fafc; font-weight: 700; cursor: pointer; color: var(--text-dark); }

        /* Details View */
        .detail-view { padding: 2rem 1.2rem; max-width: 600px; margin: 0 auto; min-height: 80vh; }
        .info-header { font-size: 0.75rem; font-weight: 800; color: var(--primary-green); letter-spacing: 0.05em; margin-bottom: 0.5rem; display: block; }
        .detail-desc { line-height: 1.7; color: #334155; margin-bottom: 1.5rem; font-size: 0.95rem; }
        .metric-box { background: #f1f5f9; padding: 1.2rem; border-radius: 16px; margin-bottom: 2rem; }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 1rem; }
        .modal-card { background: white; width: 100%; max-width: 400px; padding: 2rem; border-radius: 24px; position: relative; }
        .close-btn { position: absolute; top: 1rem; right: 1rem; border: none; background: #f1f5f9; width: 30px; height: 30px; border-radius: 50%; font-weight: 800; cursor: pointer; }
        .input-field { width: 100%; padding: 0.9rem; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 1rem; font-family: inherit; }
        .submit-btn { width: 100%; padding: 1rem; background: var(--primary-green); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }

        footer { background: #020617; color: #94a3b8; padding: 3rem 1.2rem; text-align: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('home');
            const [modal, setModal] = useState(null);
            const [slideIdx, setSlideIdx] = useState(0);

            const slides = [
                { url: "https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&w=600", title: "Live Market Intelligence" },
                { url: "https://images.unsplash.com/photo-1582672060674-bc2bd808a8b5?auto=format&fit=crop&w=600", title: "Dubai Sovereign Real Estate" },
                { url: "https://images.unsplash.com/photo-1559136555-9303baea8ebd?auto=format&fit=crop&w=600", title: "Luxury Leisure Assets" },
                { url: "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=600", title: "Premium Residential Estates" }
            ];

            useEffect(() => {
                if (view === 'home') {
                    const timer = setInterval(() => setSlideIdx(p => (p + 1) % slides.length), 3000);
                    return () => clearInterval(timer);
                }
            }, [view]);

            return (
                <div>
                    <header className="main-header">
                        <div className="brand-logo" onClick={() => setView('home')}>
                            <div className="logo-box">W</div>
                            <span className="brand-name">WorldWeb</span>
                        </div>
                        <div className="header-buttons">
                            <button className="action-btn btn-outline" onClick={() => setModal('login')}>Sign In</button>
                            <button className="action-btn btn-solid" onClick={() => setModal('signup')}>Get Started</button>
                        </div>
                    </header>

                    {view === 'home' && (
                        <main>
                            <section className="hero-banner">
                                <h1 className="hero-headline">Multiply Wealth Through <span>Proven Portfolios</span></h1>
                                <button className="action-btn btn-solid" style={{padding:'1rem 2rem'}} onClick={() => setModal('signup')}>Start Investing Today</button>
                            </section>

                            <div className="slider-wrapper">
                                <div className="slider-container">
                                    <div className="slider-track" style={{ transform: `translateX(-${slideIdx * 100}%)` }}>
                                        {slides.map((s, i) => (
                                            <div className="slide" key={i}>
                                                <img src={s.url} alt={s.title} />
                                                <div className="slide-overlay">{s.title}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="catalog-grid">
                                {/* AGRIC */}
                                <div className="product-card">
                                    <div className="img-box">
                                        <img src="https://images.unsplash.com/photo-1592982537447-7440770cbfc9?auto=format&fit=crop&w=600" />
                                        <div className="badge">7% ROI • 3 Mos</div>
                                    </div>
                                    <div className="card-body">
                                        <h3>Agriculture Asset Matrix</h3>
                                        <button className="read-more" onClick={() => setView('agric')}>Read More Details →</button>
                                    </div>
                                </div>

                                {/* REAL ESTATE */}
                                <div className="product-card">
                                    <div className="img-box">
                                        <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=600" />
                                        <div className="badge">11% ROI • 6 Mos</div>
                                    </div>
                                    <div className="card-body">
                                        <h3>Prime Real Estate Assets</h3>
                                        <button className="read-more" onClick={() => setView('estate')}>Read More Details →</button>
                                    </div>
                                </div>

                                {/* BTC */}
                                <div className="product-card">
                                    <div className="img-box">
                                        <img src="https://images.unsplash.com/photo-1621416894569-0f39ed31d247?auto=format&fit=crop&w=600" />
                                        <div className="badge" style={{color:'var(--accent-orange)'}}>13% ROI • 3 Mos</div>
                                    </div>
                                    <div className="card-body">
                                        <h3>BTC Digital Growth</h3>
                                        <button className="read-more" onClick={() => setView('btc')}>Read More Details →</button>
                                    </div>
                                </div>
                            </div>
                        </main>
                    )}

                    {/* DETAILED INFORMATION PAGES */}
                    {view === 'agric' && (
                        <div className="detail-view">
                            <span onClick={() => setView('home')} style={{color:'var(--primary-green)', fontWeight:800, cursor:'pointer'}}>← Back to Marketplace</span>
                            <h2 style={{margin:'1.5rem 0 1rem'}}>Agriculture Asset Matrix</h2>
                            <span className="info-header">THE OPPORTUNITY</span>
                            <p className="detail-desc">
                                Our Industrial Agriculture framework targets high-yield mechanised commercial farming setups. Your capital is deployed to acquire bulk seeds, irrigation hardware, and industrial-scale processing tools. 
                                <br/><br/>
                                <strong>Safety First:</strong> Every cycle is 100% pre-sold to major commercial food conglomerates, ensuring a fixed corporate payout. Furthermore, all principal capital is backed by tier-1 agricultural insurance underwriters.
                            </p>
                            <div className="metric-box">
                                <div style={{display:'flex', justifyContent:'space-between'}}><span>Fixed Yield:</span><strong>7.00%</strong></div>
                                <div style={{display:'flex', justifyContent:'space-between', marginTop:'0.5rem'}}><span>Term:</span><strong>90 Days</strong></div>
                            </div>
                            <button className="submit-btn" onClick={() => setModal('signup')}>Invest in Agric Now</button>
                        </div>
                    )}

                    {view === 'estate' && (
                        <div className="detail-view">
                            <span onClick={() => setView('home')} style={{color:'var(--primary-green)', fontWeight:800, cursor:'pointer'}}>← Back to Marketplace</span>
                            <h2 style={{margin:'1.5rem 0 1rem'}}>Prime Real Estate Assets</h2>
                            <span className="info-header">STRATEGIC GROWTH</span>
                            <p className="detail-desc">
                                WorldWeb connects individual capital to high-value sovereign property developments. We focus on undervalued land-banking and commercial retail structures in fast-developing urban corridors.
                                <br/><br/>
                                <strong>Performance:</strong> By pooling capital, we acquire institutional-grade properties that offer significantly higher rental yields and appreciation than standard residential homes. Your returns are generated from active lease agreements and equity growth.
                            </p>
                            <div className="metric-box">
                                <div style={{display:'flex', justifyContent:'space-between'}}><span>Fixed Yield:</span><strong>11.00%</strong></div>
                                <div style={{display:'flex', justifyContent:'space-between', marginTop:'0.5rem'}}><span>Term:</span><strong>180 Days</strong></div>
                            </div>
                            <button className="submit-btn" onClick={() => setModal('signup')}>Invest in Real Estate Now</button>
                        </div>
                    )}

                    {view === 'btc' && (
                        <div className="detail-view">
                            <span onClick={() => setView('home')} style={{color:'var(--primary-green)', fontWeight:800, cursor:'pointer'}}>← Back to Marketplace</span>
                            <h2 style={{margin:'1.5rem 0 1rem'}}>BTC Digital Growth Plan</h2>
                            <span className="info-header">ALGORITHMIC ALPHA</span>
                            <p className="detail-desc">
                                Navigate the digital asset space without the stress of volatility. Our system utilizes automated high-frequency arbitrage algorithms that identify millisecond price differences across 40+ global tier-1 exchanges.
                                <br/><br/>
                                <strong>Execution:</strong> This strategy extracts profit from "market inefficiencies" rather than guessing if the price will go up or down. Your principal remains stable while we harvest market alpha daily.
                            </p>
                            <div className="metric-box">
                                <div style={{display:'flex', justifyContent:'space-between'}}><span>Fixed Yield:</span><strong>13.00%</strong></div>
                                <div style={{display:'flex', justifyContent:'space-between', marginTop:'0.5rem'}}><span>Term:</span><strong>90 Days</strong></div>
                            </div>
                            <button className="submit-btn" style={{background:'var(--accent-orange)'}} onClick={() => setModal('signup')}>Invest in BTC Now</button>
                        </div>
                    )}

                    <footer>
                        <h3 style={{color:'white'}}>WorldWeb</h3>
                        <p style={{marginTop:'1.5rem'}}>© 2026 WorldWeb International Inc.</p>
                    </footer>

                    {modal && (
                        <div className="modal-overlay">
                            <div className="modal-card">
                                <button className="close-btn" onClick={() => setModal(null)}>×</button>
                                <h2 style={{marginBottom:'1rem'}}>{modal === 'login' ? 'Welcome Back' : 'Create Account'}</h2>
                                <input type="email" placeholder="Email Address" className="input-field" />
                                <input type="password" placeholder="Account Password" className="input-field" />
                                <button className="submit-btn" onClick={() => {setModal(null); setView('home');}}>Continue</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
