<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWeb | Unified Capital Framework</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-color: #f8fafc;
            --surface-white: #ffffff;
            --primary-green: #059669;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-line: #e2e8f0;
            --accent-orange: #ea580c;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-dark); background-color: var(--bg-color); -webkit-font-smoothing: antialiased; }

        /* Header & Navigation */
        .main-header { height: 70px; background: var(--surface-white); border-bottom: 1px solid var(--border-line); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; position: sticky; top: 0; z-index: 1000; }
        .brand-logo { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .logo-box { width: 36px; height: 36px; background: var(--primary-green); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 1.15rem; }
        .brand-name { font-weight: 800; font-size: 1.15rem; color: var(--text-dark); letter-spacing: -0.03em; }
        
        .desktop-nav { display: none; gap: 1.5rem; align-items: center; }
        .nav-link { color: var(--text-dark); text-decoration: none; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: color 0.2s; }
        .nav-link:hover { color: var(--primary-green); }
        
        .header-buttons { display: flex; gap: 0.5rem; align-items: center; }
        .menu-toggle { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-dark); }
        
        @media(min-width: 900px) {
            .desktop-nav { display: flex; }
        }

        .action-btn { font-family: inherit; font-size: 0.8rem; font-weight: 700; padding: 0.5rem 0.9rem; border-radius: 8px; cursor: pointer; border: none; }
        .btn-outline { color: var(--primary-green); background: rgba(5, 150, 105, 0.06); border: 1px solid var(--primary-green); }
        .btn-solid { background: var(--primary-green); color: white; transition: 0.2s; }
        .btn-solid:hover { background: #047857; }
        .btn-danger { background: #ef4444; color: white; }

        /* Left-Sided Mobile Menu Drawer */
        .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; backdrop-filter: blur(2px); }
        .left-drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 280px; background: white; z-index: 1600; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 1.2rem; box-shadow: 5px 0 25px rgba(0,0,0,0.15); animation: slideLeft 0.3s ease-out; }
        @keyframes slideLeft { from { transform: translateX(-100%); } to { transform: translateX(0); } }

        /* Hero Section with Motion Background (Nice Moving Cars) */
        .hero-banner { position: relative; padding: 6rem 1.2rem; text-align: center; overflow: hidden; margin-bottom: 2rem; background-color: #0f172a; }
        .hero-motion-bg { 
            position: absolute; inset: 0; 
            background-image: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&w=1600&q=80');
            background-size: cover; background-position: center;
            animation: panBackground 25s linear infinite alternate;
            opacity: 0.35;
        }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(transparent, rgba(15, 23, 42, 0.9)); }
        .hero-content { position: relative; z-index: 1; }
        .hero-headline { font-size: 2.3rem; font-weight: 800; margin-bottom: 1rem; line-height: 1.2; color: white; }
        .hero-headline span { color: #34d399; }
        
        @keyframes panBackground {
            0% { background-position: left center; transform: scale(1); }
            100% { background-position: right center; transform: scale(1.1); }
        }

        /* Slider */
        .slider-wrapper { max-width: 550px; margin: 0 auto 3rem; padding: 0 1.2rem; }
        .slider-container { width: 100%; height: 250px; border-radius: 20px; overflow: hidden; position: relative; border: 1px solid var(--border-line); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .slider-track { display: flex; width: 100%; height: 100%; transition: transform 0.6s ease-in-out; }
        .slide { min-width: 100%; height: 100%; position: relative; }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        .slide-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 2rem 1rem 1rem; color: white; font-weight: 700; }

        /* Catalog Layout */
        .catalog-grid { padding: 0 1.2rem; display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 4rem; max-width: 600px; margin-left: auto; margin-right: auto; }
        .product-card { background: white; border-radius: 24px; border: 1px solid var(--border-line); overflow: hidden; }
        .img-box { width: 100%; height: 190px; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 1rem; right: 1rem; background: white; padding: 0.4rem 0.8rem; border-radius: 50px; font-weight: 800; font-size: 0.7rem; color: var(--primary-green); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card-body { padding: 1.5rem; }
        .read-more { width: 100%; padding: 0.8rem; margin-top: 1rem; border: 1px solid var(--border-line); border-radius: 10px; background: #f8fafc; font-weight: 700; cursor: pointer; color: var(--text-dark); transition: background 0.2s; }
        .read-more:hover { background: var(--primary-green); color: white; border-color: var(--primary-green); }

        /* Market Chart */
        .market-section { background: #0f172a; padding: 3rem 1.2rem; color: white; text-align: center; }
        .chart-box { border-radius: 16px; overflow: hidden; margin-top: 1.5rem; height: 350px; max-width: 600px; margin-left: auto; margin-right: auto; background: #1e293b; }

        /* Container Standard */
        .page-container { padding: 2rem 1.2rem; max-width: 600px; margin: 0 auto; min-height: 80vh; }
        .info-header { font-size: 0.75rem; font-weight: 800; color: var(--primary-green); letter-spacing: 0.05em; margin-bottom: 0.5rem; display: block; text-transform: uppercase; }
        .content-block { line-height: 1.7; color: #334155; margin-bottom: 1.2rem; font-size: 0.95rem; }
        .content-list { margin-bottom: 1.5rem; padding-left: 1.2rem; line-height: 1.7; color: #334155; font-size: 0.95rem; }
        .content-list li { margin-bottom: 0.5rem; }
        .metric-box { background: #f1f5f9; padding: 1.2rem; border-radius: 16px; margin-bottom: 2rem; }

        /* User Dashboard History UI */
        .naira-card { background: linear-gradient(135deg, #064e3b 0%, #047857 100%); color: white; border-radius: 20px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .dash-row { background: white; padding: 1.1rem; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; border: 1px solid var(--border-line); }
        .bonus-card { background: rgba(16, 185, 129, 0.08); border: 1px dashed var(--primary-green); padding: 1.5rem; border-radius: 16px; text-align: center; margin-bottom: 2rem; }
        
        .history-box { background: white; border: 1px solid var(--border-line); border-radius: 18px; padding: 1.2rem; margin-top: 2rem; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 0; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        .history-item:last-child { border-bottom: none; }
        .badge-status { padding: 0.25rem 0.6rem; border-radius: 50px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
        .status-pending { background: #fef3c7; color: #d97706; }
        .status-success { background: #d1fae5; color: #059669; }

        /* Modals & Popups Setup */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 1rem; }
        .modal-card { background: white; width: 100%; max-width: 420px; padding: 2rem; border-radius: 24px; position: relative; }
        .close-btn { position: absolute; top: 1rem; right: 1rem; border: none; background: #f1f5f9; width: 30px; height: 30px; border-radius: 50%; font-weight: 800; cursor: pointer; }
        .input-field { width: 100%; padding: 0.9rem; border: 1px solid #e2e8f0; border-radius: 12px; margin-bottom: 1rem; font-family: inherit; font-size: 0.95rem; }
        
        .submit-btn { width: 100%; padding: 1rem; background: var(--primary-green); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 0.5rem; transition: 0.2s; }
        .submit-btn:hover { background: #047857; }
        .code-inputs { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 1.5rem; }
        .code-box { width: 45px; height: 50px; border: 1px solid #cbd5e1; border-radius: 8px; text-align: center; font-size: 1.2rem; font-weight: 700; }

        .btn-group { display: flex; gap: 1rem; margin-top: 1.5rem; }
        .half-btn { flex: 1; padding: 1rem; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }

        /* Red Error Message Styling */
        .error-banner { background: #fee2e2; color: #dc2626; padding: 1rem; border-radius: 12px; font-weight: 700; font-size: 0.9rem; text-align: center; margin-top: 1rem; border: 1px solid #fca5a5; }

        /* Premium Alerts */
        .premium-alert { text-align: center; }
        .premium-alert .icon-box {
            width: 70px; height: 70px; border-radius: 50%; background: rgba(16, 185, 129, 0.1); 
            color: var(--primary-green); font-size: 2rem; display: flex; align-items: center; 
            justify-content: center; margin: 0 auto 1.5rem;
        }
        footer { background: #020617; color: #94a3b8; padding: 3rem 1.2rem; text-align: center; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const formatNaira = (num) => "₦" + (num || 0).toLocaleString("en-NG", { minimumFractionDigits: 2 });

        function App() {
            const [view, setView] = useState('home');
            const [modal, setModal] = useState(null);
            const [user, setUser] = useState(null);
            const [menuOpen, setMenuOpen] = useState(false);
            const [slideIdx, setSlideIdx] = useState(0);
            const [alertData, setAlertData] = useState(null);
            const [activePlan, setActivePlan] = useState(null);

            // Custom Form Data for Staking Pages
            const [stakeAmount, setStakeAmount] = useState('');
            const [termsAgreed, setTermsAgreed] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');

            // Core mock tracking state logs
            const [history, setHistory] = useState([
                { type: 'Bonus', amount: 10000, date: 'Just now', status: 'Successful' }
            ]);

            const slides = [
                { url: "https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&w=600", title: "Live Market Intelligence" },
                { url: "https://images.unsplash.com/photo-1582672060674-bc2bd808a8b5?auto=format&fit=crop&w=600", title: "Dubai Sovereign Real Estate" },
                { url: "https://images.unsplash.com/photo-1559136555-9303baea8ebd?auto=format&fit=crop&w=600", title: "Luxury Leisure Assets" },
                { url: "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=600", title: "Premium Residential Estates" }
            ];

            useEffect(() => {
                if (view === 'home') {
                    const timer = setInterval(() => setSlideIdx(p => (p + 1) % slides.length), 3000);
                    return () => clearInterval(timer);
                }
            }, [view]);

            useEffect(() => {
                if (view === 'home' && window.TradingView) {
                    new window.TradingView.MediumWidget({
                        "symbols": [["BTC", "BINANCE:BTCUSDT|1D"], ["Gold", "OANDA:XAUUSD|1D"], ["USD/NGN", "FX_IDC:USDNGN|1D"]],
                        "chartOnly": false, "width": "100%", "height": 350, "locale": "en", "colorTheme": "dark",
                        "autosize": false, "scalePosition": "right", "scaleMode": "Normal", "chartType": "line", "container_id": "chart_div"
                    });
                }
            }, [view]);

            const navigate = (v) => { setView(v); setMenuOpen(false); window.scrollTo(0,0); };
            const triggerAlert = (title, message, icon) => { setAlertData({ title, message, icon }); };

            const handleLogin = () => { 
                setUser({ name: 'Ijaola Oluwatosin', email: 'ijaola@worldweb.io', balance: 0, bonusClaimed: false }); 
                setModal(null); setView('dashboard'); 
            };
            
            const handleSignupSubmit = () => { setModal('verification'); };
            const handleVerificationComplete = () => { 
                setUser({ name: 'Ijaola Oluwatosin', email: 'ijaola@worldweb.io', balance: 0, bonusClaimed: false }); 
                setModal(null); setView('dashboard'); 
            };
            const logout = () => { setUser(null); setView('home'); };

            const claimBonus = () => {
                setUser(prev => ({ ...prev, balance: prev.balance + 10000, bonusClaimed: true }));
                triggerAlert('Bonus Claimed!', 'Congratulations! ₦10,000 Welcome Bonus has been credited to your balance.', '🎁');
            };

            const submitDeposit = () => {
                setHistory(prev => [{ type: 'Deposit (BTC)', amount: 45000, date: 'Pending Verification', status: 'Pending' }, ...prev]);
                triggerAlert('Pending Confirmation', 'Your deposit evidence has been received. Confirmation takes 3 to 4 minutes to reflect.', '⏳');
                navigate('dashboard');
            };

            const submitWithdrawal = () => {
                setHistory(prev => [{ type: 'Withdrawal (BTC)', amount: 15000, date: 'Processing Launch', status: 'Pending' }, ...prev]);
                triggerAlert('Withdrawal Initiated', 'Your money is on the way! Processing times take up to 24 hours to reach your external wallet.', '✅');
                navigate('dashboard');
            };

            // Setup custom investment processing workflow 
            const openInvestmentPage = (planKey) => {
                if (!user) { setModal('signup'); return; }
                setActivePlan(planKey);
                setStakeAmount('');
                setTermsAgreed(false);
                setErrorMsg('');
                navigate('invest-form');
            };

            const executeInvestmentSubmit = () => {
                if (!stakeAmount || Number(stakeAmount) <= 0) {
                    setErrorMsg('Please enter a valid allocation amount.'); return;
                }
                if (!termsAgreed) {
                    setErrorMsg('You must read and accept the terms and conditions to proceed.'); return;
                }
                setErrorMsg('');
                setModal('confirm-stake');
            };

            const acceptStake = () => {
                setModal(null);
                setHistory(prev => [{ type: `Stake (${activePlan.toUpperCase()})`, amount: Number(stakeAmount), date: 'Active Cycle', status: 'Successful' }, ...prev]);
                triggerAlert('Investment Activated', 'Thank you for trusting us, we will verify your deposit and update, kindly exercise patience.', '🛡️');
                navigate('dashboard');
            };

            const rejectStake = () => {
                setModal(null);
                setErrorMsg('Transaction aborted. Action declined by investor.');
            };

            return (
                <div>
                    {/* TOP HEADER */}
                    <header className="main-header">
                        <div className="brand-logo" onClick={() => navigate(user ? 'dashboard' : 'home')}>
                            <div className="logo-box">W</div>
                            <span className="brand-name">WorldWeb</span>
                        </div>

                        <nav className="desktop-nav">
                            <span className="nav-link" onClick={() => navigate('home')}>Home</span>
                            <span className="nav-link" onClick={() => navigate('about')}>About Us</span>
                            <span className="nav-link" onClick={() => navigate('how-to-invest')}>How to Invest</span>
                            <span className="nav-link" onClick={() => navigate('terms')}>Terms & Conditions</span>
                        </nav>

                        <div className="header-buttons">
                            {!user ? (
                                <>
                                    <button className="action-btn btn-outline" onClick={() => setModal('login')}>Sign In</button>
                                    <button className="action-btn btn-solid" onClick={() => setModal('signup')}>Get Started</button>
                                </>
                            ) : (
                                <button className="action-btn btn-solid" onClick={() => navigate('dashboard')}>Dashboard</button>
                            )}
                            <button className="menu-toggle" onClick={() => setMenuOpen(true)}>☰</button>
                        </div>
                    </header>

                    {/* LEFT-SIDED NAVIGATION MENU DRAWER */}
                    {menuOpen && (
                        <>
                            <div className="drawer-overlay" onClick={() => setMenuOpen(false)}></div>
                            <div className="left-drawer">
                                <button className="close-btn" onClick={() => setMenuOpen(false)}>×</button>
                                <div className="brand-logo" style={{marginBottom:'1rem'}}>
                                    <div className="logo-box">W</div>
                                    <span className="brand-name">WorldWeb</span>
                                </div>
                                <span className="nav-link" onClick={() => navigate('home')}>🏠 Home</span>
                                <span className="nav-link" onClick={() => navigate('about')}>ℹ️ About Us</span>
                                <span className="nav-link" onClick={() => navigate('how-to-invest')}>📖 How to Invest</span>
                                <span className="nav-link" onClick={() => navigate('terms')}>📋 Terms & Conditions</span>
                                <hr style={{borderColor:'#f1f5f9'}}/>
                                {!user ? (
                                    <>
                                        <span className="nav-link" style={{color:'var(--primary-green)'}} onClick={() => { setMenuOpen(false); setModal('login'); }}>Sign In</span>
                                        <span className="nav-link" style={{fontWeight:700}} onClick={() => { setMenuOpen(false); setModal('signup'); }}>Register Account</span>
                                    </>
                                ) : (
                                    <>
                                        <span className="nav-link" style={{color:'var(--primary-green)'}} onClick={() => navigate('dashboard')}>💼 Dashboard</span>
                                        <span className="nav-link" style={{color:'#ef4444'}} onClick={logout}>🚪 Log Out</span>
                                    </>
                                )}
                            </div>
                        </>
                    )}

                    {/* HOME MAIN PAGE */}
                    {view === 'home' && (
                        <main>
                            {/* Hero Container showcasing Motion Cars Image Background Animation */}
                            <section className="hero-banner">
                                <div className="hero-motion-bg"></div>
                                <div className="hero-overlay"></div>
                                <div className="hero-content">
                                    <h1 className="hero-headline">Multiply Wealth Through<br/><span>Proven Portfolios</span></h1>
                                    <button className="action-btn btn-solid hero-btn" style={{padding:'1rem 2.5rem', fontSize:'0.9rem', marginTop:'1rem'}} onClick={() => setModal('signup')}>Start Investing Today</button>
                                </div>
                            </section>

                            {/* Preserved Visual Multi-Slide Catalog */}
                            <div className="slider-wrapper">
                                <div className="slider-container">
                                    <div className="slider-track" style={{ transform: `translateX(-${slideIdx * 100}%)` }}>
                                        {slides.map((s, i) => (
                                            <div className="slide" key={i}>
                                                <img src={s.url} alt={s.title} />
                                                <div className="slide-overlay">{s.title}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            <div className="catalog-grid">
                                <div className="product-card">
                                    <div className="img-box"><img src="https://images.unsplash.com/photo-1592982537447-7440770cbfc9?auto=format&fit=crop&w=600" /><div className="badge">7% ROI • 3 Mos</div></div>
                                    <div className="card-body"><h3>Agriculture Asset Matrix</h3><button className="read-more" onClick={() => navigate('agric')}>Read More Details →</button></div>
                                </div>
                                <div className="product-card">
                                    <div className="img-box"><img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=600" /><div className="badge">10% ROI • 3 Mos</div></div>
                                    <div className="card-body"><h3>Prime Real Estate Assets</h3><button className="read-more" onClick={() => navigate('estate')}>Read More Details →</button></div>
                                </div>
                                <div className="product-card">
                                    <div className="img-box"><img src="https://images.unsplash.com/photo-1621416894569-0f39ed31d247?auto=format&fit=crop&w=600" /><div className="badge">13% ROI • 3 Mos</div></div>
                                    <div className="card-body"><h3>BTC Digital Growth</h3><button className="read-more" onClick={() => navigate('btc')}>Read More Details →</button></div>
                                </div>
                            </div>

                            <section className="market-section">
                                <h2>Live Market Intelligence</h2>
                                <div id="chart_div" className="chart-box"></div>
                            </section>
                        </main>
                    )}

                    {/* AGRIC DETAIL VIEW */}
                    {view === 'agric' && (
                        <div className="page-container">
                            <span onClick={() => navigate(user ? 'dashboard' : 'home')} style={{color:'var(--primary-green)', fontWeight:800, cursor:'pointer'}}>← Back</span>
                            <img src="https://images.unsplash.com/photo-1592982537447-7440770cbfc9?auto=format&fit=crop&w=800" style={{width:'100%', borderRadius:'20px', margin:'1.5rem 0'}} />
                            <h2>Agriculture Asset Matrix</h2>
                            <span className="info-header" style={{marginTop:'0.5rem'}}>7% ROI in 3 Months</span>
                            
                            <p className="content-block">Agriculture remains one of the most stable and essential sectors in the global economy. As populations continue to grow, the demand for food production, storage, and agricultural infrastructure increases every year. The Agriculture Asset Matrix investment opportunity is designed for individuals seeking a reliable and sustainable short-term investment with measurable returns.</p>
                            <p className="content-block">This investment focuses on carefully selected agricultural operations including crop cultivation, farm expansion, produce distribution, and agribusiness support systems. By combining modern farming practices, strategic partnerships, and efficient supply management, the project creates steady revenue cycles that support investor profitability.</p>
                            
                            <h3 style={{margin:'1.5rem 0 1rem'}}>Why Invest in Agriculture Asset Matrix?</h3>
                            <ul className="content-list">
                                <li><strong>Consistent Demand:</strong> Food is a necessity, making agriculture one of the few industries with year-round market demand.</li>
                                <li><strong>Low Volatility:</strong> Agricultural investments are generally less affected by sudden market fluctuations compared to many digital or speculative assets.</li>
                                <li><strong>Sustainable Growth:</strong> Investments contribute to real economic productivity and long-term development.</li>
                                <li><strong>Diversified Operations:</strong> Revenue is supported through multiple agricultural streams to reduce risk exposure.</li>
                                <li><strong>Short-Term Profitability:</strong> Earn 7% ROI within 3 months, creating a balance between stability and attractive returns.</li>
                            </ul>

                            <button className="submit-btn" onClick={() => openInvestmentPage('agriculture')}>Invest Now</button>
                        </div>
                    )}

                    {/* ESTATE DETAIL VIEW */}
                    {view === 'estate' && (
                        <div className="page-container">
                            <span onClick={() => navigate(user ? 'dashboard' : 'home')} style={{color:'var(--primary-green)', fontWeight:800, cursor:'pointer'}}>← Back</span>
                            <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800" style={{width:'100%', borderRadius:'20px', margin:'1.5rem 0'}} />
                            <h2>Prime Real Estate Assets</h2>
                            <span className="info-header" style={{marginTop:'0.5rem'}}>10% ROI in 3 Months</span>

                            </ul>

                            <p className="content-block">Bitcoin continues to lead the digital financial revolution as the world’s most recognized and influential cryptocurrency. BTC Digital Growth provides investors with access to the expanding digital asset market through a structured investment model focused on Bitcoin-related opportunities and strategic market positioning.</p>

                            <button className="submit-btn" style={{background:'var(--accent-orange)'}} onClick={() => openInvestmentPage('bitcoin growth')}>Invest Now</button>
                        </div>
                    )}

                    {/* NEW CUSTOM INVESTMENT FORM PAGE */}
                    {view === 'invest-form' && user && (
                        <div className="page-container">
                            <span onClick={() => navigate('dashboard')} style={{color:'var(--primary-green)', fontWeight:800, cursor:'pointer'}}>← Abort Strategy</span>
                            <h2 style={{marginTop:'1.5rem', marginBottom:'0.5rem'}}>Secure Portfolio Commitment</h2>

                                <label style={{fontSize:'0.85rem', fontWeight:700, display:'block', marginBottom:'0.4rem'}}>Verified Profile Email Address</label>

                                <label style={{fontSize:'0.85rem', fontWeight:700, display:'block', marginBottom:'0.4rem'}}>Amount to Invest (₦)</label>

                                <div style={{border:'1px solid var(--border-line)', borderRadius:'12px', padding:'1rem', background:'#f8fafc', height:'120px', overflowY:'scroll', fontSize:'0.8rem', color:'#475569', marginBottom:'1rem'}}>
                                    <strong>Plan Agreement Matrix:</strong> All assets under deployment are locked in 3-month yield processing contracts. Capital is collateralized under real-world positions. Early liquidations are subject to standard operational review. Returns compute linearly.

                    {modal === 'verification' && (
                        <div className="modal-overlay">
                            <div className="modal-card" style={{textAlign:'center'}}>
                                <h2>Verify Email Entry</h2>
                                <div className="code-inputs" style={{marginTop:'1.5rem'}}>
                                    <input type="text" maxLength="1" className="code-box" defaultValue="4" />
                                    <input type="text" maxLength="1" className="code-box" defaultValue="8" />

                            </div>
                        </div>
                    )}

                    {/* INTERACTIVE MULTI-STAGE STAKING FLOW CONFIRMATION ENGINE */}
                    {modal === 'confirm-stake' && (
                        <div className="modal-overlay">
                            <div className="modal-card" style={{textAlign:'center'}}>

                                <p style={{margin:'1rem 0 1.5rem', color:'#475569', fontSize:'0.95rem'}}>
                                    Are you entirely sure you want to continue staking {formatNaira(Number(stakeAmount))} into the {activePlan} framework?
                                </p>
                                <div className="btn-group">
                                    <button className="half-btn btn-solid" onClick={acceptStake}>Yes</button>

                            </div>

                    {/* CUSTOM CENTRAL ALERT ENGINE */}
                    {alertData && (
                        <div className="modal-overlay">
                            <div className="modal-card premium-alert">
                                <div className="icon-box">{alertData.icon}</div>
                                <h2>{alertData.title}</h2>
                                <p style={{fontSize:'0.95rem', color:'#334155', margin:'1rem 0 1.5rem', lineHeight:1.6}}>{alertData.message}</p>
                                <button className="submit-btn" onClick={() => setAlertData(null)}>Acknowledge</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
