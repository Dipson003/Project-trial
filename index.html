<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWeb Admin Portal</title>
    <!-- React & Babel Scripts for mobile browser execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const ADMIN_USER = "admin@worldweb.io";
        const ADMIN_PASS = "wwadmin2025";

        // ── INITIALIZING SIMULATED DATABASE ───────────────────────
        if (!window.__WWStore) {
          window.__WWStore = {
            stats: {
              totalUsers: 142,
              totalDeposits: 2450000,
              totalWithdrawn: 820000,
            },
            pendingDeposits: [
              { id: "dp-101", user: "Chidi Okonkwo", type: "Deposit", amount: 150000, method: "BTC", proof: "ww_tx_992a...f78", date: "2026-05-25" },
              { id: "dp-102", user: "Amara Nwosu", type: "Deposit", amount: 50000, method: "Bank Transfer", proof: "Ref: 991204882", date: "2026-05-26" }
            ],
            pendingWithdrawals: [
              { id: "wd-201", user: "Tunde Bakare", type: "Withdrawal", amount: 75000, account: "GTBank - 0123456789", date: "2026-05-26" }
            ],
            history: [
              { id: "tx-501", user: "John Doe", type: "Deposit", amount: 100000, status: "Confirmed", date: "2026-05-24" },
              { id: "tx-502", user: "Sarah Smith", type: "Withdrawal", amount: 30000, status: "Confirmed", date: "2026-05-24" },
            ]
          };
        }

        const fmtNGN = n => "₦" + (n || 0).toLocaleString("en-NG", { minimumFractionDigits: 2 });

        // ── CSS STYLING ─────────────────────────────────────────────────────────────
        const CSS_STYLES = `
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{--bg:#f8fafc;--white:#fff;--navy:#0b1f3a;--blue:#1a56db;--green:#059669;--green-bg:#ecfdf5;--amber:#d97706;--amber-bg:#fffbeb;--red:#dc2626;--red-bg:#fef2f2;--text:#0f172a;--text2:#334155;--muted:#64748b;--border:#e2e8f0;--sidebar:240px;--sh:0 1px 3px rgba(0,0,0,.05);--sh-md:0 4px 12px rgba(0,0,0,.05);}
        body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;}
        .app{display:flex;min-height:100vh;}
        .sidebar{width:var(--sidebar);background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;}
        .main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
        .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 1.5rem;height:64px;display:flex;align-items:center;justify-content:between;position:sticky;top:0;z-index:50;box-shadow:var(--sh);}
        .content{padding:1.5rem;flex:1;}
        .sb-logo{padding:1.5rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:.5rem;}
        .sb-logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--blue),#60a5fa);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;}
        .sb-logo-text{font-weight:800;color:white;font-size:1rem;}
        .sb-nav{flex:1;padding:1rem .5rem;display:flex;flex-direction:column;gap:.2rem;}
        .sb-link{display:flex;align-items:center;gap:.7rem;padding:.65rem .9rem;border-radius:8px;color:rgba(255,255,255,.6);font-size:.85rem;font-weight:500;cursor:pointer;border:none;background:none;width:100%;text-align:left;}
        .sb-link.active{background:rgba(26,86,219,.3);color:white;font-weight:600;}
        .btn-logout{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:.8rem;padding:1rem;text-align:left;border-top:1px solid rgba(255,255,255,.07);}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1rem;margin-bottom:1.5rem;}
        .stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.2rem;box-shadow:var(--sh);}
        .stat-label{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.25rem;}
        .stat-value{font-size:1.4rem;font-weight:800;color:var(--navy);}
        .stat-value.green{color:var(--green);}.stat-value.red{color:var(--red);}
        .card{background:var(--white);border:1px solid var(--border);border-radius:12px;box-shadow:var(--sh);margin-bottom:1.5rem;overflow:hidden;}
        .card-header{padding:1rem 1.2rem;border-bottom:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:space-between;}
        .card-title{font-weight:700;font-size:.9rem;color:var(--navy);display:flex;align-items:center;gap:.5rem;}
        .badge{font-size:.7rem;font-weight:700;padding:.15rem .4rem;border-radius:6px;}
        .badge-amber{background:var(--amber-bg);color:var(--amber);}
        table.t{width:100%;border-collapse:collapse;text-align:left;}
        table.t th{font-size:.7rem;font-weight:700;color:var(--muted);padding:.75rem 1.2rem;background:#f8fafc;border-bottom:1px solid var(--border);text-transform:uppercase;}
        table.t td{padding:.9rem 1.2rem;font-size:.85rem;color:var(--text2);border-bottom:1px solid var(--border);vertical-align:middle;}
        .action-btns{display:flex;gap:.5rem;}
        .btn-action{padding:.4rem .75rem;border-radius:6px;font-size:.75rem;font-weight:700;cursor:pointer;border:none;transition:all .1s;}
        .btn-approve{background:var(--green-bg);color:var(--green);}.btn-approve:hover{background:var(--green);color:white;}
        .btn-reject{background:var(--red-bg);color:var(--red);}.btn-reject:hover{background:var(--red);color:white;}
        .pill{font-size:.65rem;font-weight:700;padding:.2rem .5rem;border-radius:100px;text-transform:uppercase;}
        .pill-green{background:var(--green-bg);color:var(--green);}.pill-red{background:var(--red-bg);color:var(--red);}.pill-blue{background:#eff6ff;color:var(--blue);}
        .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0b1f3a 0%,#142d52 100%);padding:1.5rem;}
        .login-card{background:white;border-radius:16px;padding:2.5rem 2rem;width:100%;max-width:400px;box-shadow:var(--sh-md);}
        .fi{width:100%;background:#f8fafc;border:1.5px solid var(--border);padding:.7rem .9rem;border-radius:8px;margin-bottom:1rem;font-family:inherit;}
        .btn-login{width:100%;background:var(--blue);color:white;border:none;font-weight:700;padding:.8rem;border-radius:8px;cursor:pointer;}
        @media(max-width:900px){
          .sidebar{display:none;}
          .main{margin-left:0;}
          .topbar{padding:0 1rem;}
          .content{padding:1rem;}
          table.t{display:block;overflow-x:auto;}
        }
        `;

        // ── LOGIN PAGE ───────────────────────────────────────────────────────
        function LoginPage({ onLogin }) {
          const [email, setEmail] = useState("");
          const [pass, setPass] = useState("");
          const handleLogin = () => {
            if (email === ADMIN_USER && pass === ADMIN_PASS) onLogin();
            else alert("Invalid credentials. Try again.");
          };
          return (
            <div className="login-page">
              <div className="login-card">
                <h2 style={{ marginBottom: "0.25rem", color: "var(--navy)" }}>Welcome Back</h2>
                <p style={{ color: "var(--muted)", fontSize: "0.8rem", marginBottom: "1.5rem" }}>Sign in to manage WorldWeb transactions</p>
                <input className="fi" type="email" placeholder="admin@worldweb.io" value={email} onChange={e => setEmail(e.target.value)} />
                <input className="fi" type="password" placeholder="Password" value={pass} onChange={e => setPass(e.target.value)} />
                <button className="btn-login" onClick={handleLogin}>Sign In</button>
              </div>
            </div>
          );
        }

        // ── MAIN PORTAL CONTENT ──────────────────────────────────────────────
        function Dashboard() {
          const [db, setDb] = useState({ ...window.__WWStore });

          const syncData = (updatedDb) => {
            window.__WWStore = updatedDb;
            setDb(updatedDb);
          };

          // Handle Action for Deposits
          const handleDepositAction = (id, action) => {
            const depositItem = db.pendingDeposits.find(d => d.id === id);
            if (!depositItem) return;

            let updatedStats = { ...db.stats };
            if (action === "confirm") {
              updatedStats.totalDeposits += depositItem.amount;
            }

            const updatedPending = db.pendingDeposits.filter(d => d.id !== id);
            const updatedHistory = [
              {
                id: depositItem.id,
                user: depositItem.user,
                type: "Deposit",
                amount: depositItem.amount,
                status: action === "confirm" ? "Confirmed" : "Rejected",
                date: new Date().toISOString().slice(0, 10)
              },
              ...db.history
            ];

            syncData({ ...db, stats: updatedStats, pendingDeposits: updatedPending, history: updatedHistory });
          };

          // Handle Action for Withdrawals
          const handleWithdrawalAction = (id, action) => {
            const withdrawalItem = db.pendingWithdrawals.find(w => w.id === id);
            if (!withdrawalItem) return;

            let updatedStats = { ...db.stats };
            if (action === "confirm") {
              updatedStats.totalWithdrawn += withdrawalItem.amount;
            }

            const updatedPending = db.pendingWithdrawals.filter(w => w.id !== id);
            const updatedHistory = [
              {
                id: withdrawalItem.id,
                user: withdrawalItem.user,
                type: "Withdrawal",
                amount: withdrawalItem.amount,
                status: action === "confirm" ? "Confirmed" : "Rejected",
                date: new Date().toISOString().slice(0, 10)
              },
              ...db.history
            ];

            syncData({ ...db, stats: updatedStats, pendingWithdrawals: updatedPending, history: updatedHistory });
          };

          return (
            <div className="content">
              {/* Analytics Summary Cards */}
              <div className="stats-grid">
                <div className="stat-card">
                  <div className="stat-label">Total Registered Users</div>
                  <div className="stat-value">{db.stats.totalUsers}</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Approved Deposits</div>
                  <div className="stat-value green">{fmtNGN(db.stats.totalDeposits)}</div>
                </div>
                <div className="stat-card">
                  <div className="stat-label">Approved Withdrawals</div>
                  <div className="stat-value red">{fmtNGN(db.stats.totalWithdrawn)}</div>
                </div>
              </div>

              {/* SECTION 1: PENDING DEPOSITS MODERATION */}
              <div className="card">
                <div className="card-header">
                  <div className="card-title">Pending Deposits Requests <span className="badge badge-amber">{db.pendingDeposits.length} items</span></div>
                </div>
                {db.pendingDeposits.length === 0 ? (
                  <p style={{ padding: "1.5rem", color: "var(--muted)", fontSize: "0.85rem" }}>No incoming deposits awaiting approval.</p>
                ) : (
                  <table className="t">
                    <thead>
                      <tr>
                        <th>User</th>
                        <th>Amount</th>
                        <th>Payment Proof Reference</th>
                        <th>Date Requested</th>
                        <th style={{ textAlign: "right" }}>Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {db.pendingDeposits.map(dep => (
                        <tr key={dep.id}>
                          <td style={{ fontWeight: 600 }}>{dep.user}</td>
                          <td style={{ color: "var(--green)", fontWeight: 700 }}>{fmtNGN(dep.amount)}</td>
                          <td><code style={{ background: "#f1f5f9", padding: "0.2rem 0.4rem", borderRadius: "4px", fontSize: "0.75rem" }}>{dep.proof}</code></td>
                          <td>{dep.date}</td>
                          <td>
                            <div className="action-btns" style={{ justifyContent: "flex-end" }}>
                              <button className="btn-action btn-approve" onClick={() => handleDepositAction(dep.id, "confirm")}>Confirm</button>
                              <button className="btn-action btn-reject" onClick={() => handleDepositAction(dep.id, "reject")}>Reject</button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>

              {/* SECTION 2: PENDING WITHDRAWALS MODERATION */}
              <div className="card">
                <div className="card-header">
                  <div className="card-title">Pending Withdrawal Requests <span className="badge badge-amber">{db.pendingWithdrawals.length} items</span></div>
                </div>
                {db.pendingWithdrawals.length === 0 ? (
                  <p style={{ padding: "1.5rem", color: "var(--muted)", fontSize: "0.85rem" }}>No withdrawal requests currently pending.</p>
                ) : (
                  <table className="t">
                    <thead>
                      <tr>
                        <th>User Name</th>
                        <th>Payout Amount</th>
                        <th>Target Settlement Account Details</th>
                        <th>Requested Date</th>
                        <th style={{ textAlign: "right" }}>Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {db.pendingWithdrawals.map(wd => (
                        <tr key={wd.id}>
                          <td style={{ fontWeight: 600 }}>{wd.user}</td>
                          <td style={{ color: "var(--red)", fontWeight: 700 }}>{fmtNGN(wd.amount)}</td>
                          <td style={{ fontSize: "0.8rem", color: "var(--text2)" }}>{wd.account}</td>
                          <td>{wd.date}</td>
                          <td>
                            <div className="action-btns" style={{ justifyContent: "flex-end" }}>
                              <button className="btn-action btn-approve" onClick={() => handleWithdrawalAction(wd.id, "confirm")}>Confirm</button>
                              <button className="btn-action btn-reject" onClick={() => handleWithdrawalAction(wd.id, "reject")}>Reject</button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>

              {/* SECTION 3: SYSTEM AUDIT LOG HISTORY */}
              <div className="card">
                <div className="card-header"><div className="card-title">Completed Actions History Log</div></div>
                <table className="t">
                  <thead>
                    <tr>
                      <th>Transaction User</th>
                      <th>Class</th>
                      <th>Value Amount</th>
                      <th>Execution Status</th>
                      <th>Finalized Date</th>
                    </tr>
                  </thead>
                  <tbody>
                    {db.history.map((h, i) => (
                      <tr key={i}>
                        <td>{h.user}</td>
                        <td><span className="pill pill-blue">{h.type}</span></td>
                        <td style={{ fontWeight: "600" }}>{fmtNGN(h.amount)}</td>
                        <td>
                          <span className={`pill ${h.status === "Confirmed" ? "pill-green" : "pill-red"}`}>
                            {h.status}
                          </span>
                        </td>
                        <td>{h.date}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        // ── APP ROOT ROOT ARCHITECTURE ───────────────────────────────────────
        function App() {
          const [loggedIn, setLoggedIn] = useState(false);

          useEffect(() => {
            const s = document.createElement("style");
            s.textContent = CSS_STYLES;
            document.head.appendChild(s);
          }, []);

          if (!loggedIn) return <LoginPage onLogin={() => setLoggedIn(true)} />;

          return (
            <div className="app">
              <div className="sidebar">
                <div className="sb-logo">
                  <div className="sb-logo-mark">W</div>
                  <div className="sb-logo-text">WorldWeb</div>
                </div>
                <div className="sb-nav">
                  <button className="sb-link active">Admin Portal</button>
                </div>
                <button className="btn-logout" onClick={() => setLoggedIn(false)}>Secure Logout</button>
              </div>
              <div className="main">
                <div className="topbar">
                  <strong style={{ color: "var(--navy)" }}>System Ledger Moderation Terminal</strong>
                </div>
                <Dashboard />
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
