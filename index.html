<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorldWeb Admin Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const ADMIN_USER = "admin@worldweb.io";
        const ADMIN_PASS = "wwadmin2025";

        // ── SHARED STORE ──────────────────────────────────────────
        function getStore() {
          if (!window.__WWStore) {
            window.__WWStore = {
              users: {
                "demo@worldweb.io": {
                  password:"demo1234", name:"Chidi Okonkwo", phone:"", loginMethod:"email",
                  joined:"Jan 2025", balance:85000, gain:10.0, welcomeBonus:false,
                  activePlan:{id:"agriculture",name:"Agriculture",invested:50000,roi:"10%",startDate:"2025-04-01"},
                  transactions:[
                    {id:1,type:"bonus",amount:5000,date:"2025-01-05",status:"confirmed",txHash:"ww001...bonus",label:"Welcome Bonus",btc:0},
                    {id:2,type:"deposit",amount:100000,date:"2025-01-10",status:"confirmed",txHash:"3a1b2c...f9e8",label:"BTC Deposit",btc:0.00092},
                    {id:3,type:"investment",amount:50000,date:"2025-04-01",status:"confirmed",txHash:"inv001...agri",label:"Agriculture Plan",btc:0},
                    {id:4,type:"withdrawal",amount:20000,date:"2025-04-10",status:"confirmed",txHash:"WD-wd01",label:"Bank Withdrawal",btc:0},
                  ],
                },
              },
              byPhone:{},
              usedTxHashes: new Set(["3a1b2c...f9e8"]),
              pendingDeposits:[],
              pendingWithdrawals:[],
              adminNotifications:0,
              _listeners:[],
              notify(){ this._listeners.forEach(fn=>fn()); },
              subscribe(fn){ this._listeners.push(fn); return ()=>{ this._listeners=this._listeners.filter(f=>f!==fn); }; }
            };
          }
          return window.__WWStore;
        }

        const fmtNGN = n => "₦"+(n||0).toLocaleString("en-NG",{minimumFractionDigits:2,maximumFractionDigits:2});
        const todayStr = () => new Date().toISOString().slice(0,10);

        function getLiveStats() {
          const S = getStore();
          const users = Object.values(S.users);
          const allTx = users.flatMap(u=>u.transactions||[]);
          return {
            totalUsers: users.length,
            activeUsers: users.filter(u=>u.activePlan).length,
            totalDeposits: allTx.filter(t=>t.type==="deposit").reduce((s,t)=>s+t.amount,0),
            totalInvested: allTx.filter(t=>t.type==="investment").reduce((s,t)=>s+t.amount,0),
            totalWithdrawn: allTx.filter(t=>t.type==="withdrawal").reduce((s,t)=>s+t.amount,0),
            pendingDeposits: S.pendingDeposits.length,
            pendingDepositAmt: S.pendingDeposits.reduce((s,d)=>s+d.ngnAmt,0),
            pendingWithdrawals: S.pendingWithdrawals.filter(w=>w.status==="pending").length,
            pendingWithdrawalAmt: S.pendingWithdrawals.filter(w=>w.status==="pending").reduce((s,w)=>s+w.amount,0),
            totalBTC: allTx.filter(t=>t.type==="deposit").reduce((s,t)=>s+(t.btc||0),0),
            planBreakdown: {
              Agriculture: users.filter(u=>u.activePlan?.name==="Agriculture").length,
              "Real Estate": users.filter(u=>u.activePlan?.name==="Real Estate").length,
              Energy: users.filter(u=>u.activePlan?.name==="Energy").length,
              Technology: users.filter(u=>u.activePlan?.name==="Technology").length,
              None: users.filter(u=>!u.activePlan).length,
            }
          };
        }

        // ── CSS ───────────────────────────────────────────────────────────────────────
        const CSS_STLYES=`
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{--bg:#f0f2f8;--white:#fff;--navy:#0b1f3a;--navy2:#142d52;--blue:#1a56db;--blue-light:#eff6ff;--green:#059669;--green-bg:#ecfdf5;--amber:#d97706;--amber-bg:#fffbeb;--red:#dc2626;--red-bg:#fef2f2;--text:#0f172a;--text2:#334155;--muted:#64748b;--muted2:#94a3b8;--border:#e2e8f0;--border2:#cbd5e1;--sidebar:240px;--sh:0 1px 3px rgba(0,0,0,.07);--sh-md:0 4px 12px rgba(0,0,0,.06);--sh-lg:0 12px 24px rgba(0,0,0,.07);}
        body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;}
        .app{display:flex;min-height:100vh;}
        .sidebar{width:var(--sidebar);background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;}
        .main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh;}
        .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--sh);}
        .content{padding:2rem;flex:1;}
        .sb-logo{padding:1.6rem 1.4rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:.6rem;}
        .sb-logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),#60a5fa);border-radius:9px;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:.9rem;flex-shrink:0;}
        .sb-logo-text{font-weight:800;font-size:1rem;color:white;letter-spacing:-.02em;line-height:1.2;}
        .sb-nav{flex:1;padding:1rem .75rem;display:flex;flex-direction:column;gap:.15rem;overflow-y:auto;}
        .sb-link{display:flex;align-items:center;gap:.7rem;padding:.65rem .9rem;border-radius:9px;color:rgba(255,255,255,.55);font-size:.86rem;font-weight:500;cursor:pointer;border:none;background:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .18s;width:100%;text-align:left;}
        .sb-link:hover{background:rgba(255,255,255,.07);color:white;}
        .sb-link.active{background:rgba(26,86,219,.4);color:white;font-weight:600;}
        .sb-badge{margin-left:auto;background:var(--red);color:white;font-size:.62rem;font-weight:700;padding:.1rem .42rem;border-radius:100px;min-width:18px;text-align:center;}
        .sb-foot{padding:1rem 1.4rem;border-top:1px solid rgba(255,255,255,.07);}
        .sb-admin{display:flex;align-items:center;gap:.65rem;}
        .sb-admin-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#60a5fa);display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:.8rem;flex-shrink:0;}
        .sb-admin-name{font-size:.82rem;font-weight:600;color:white;}
        .btn-logout{background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;font-size:.75rem;margin-left:auto;padding:.2rem .4rem;border-radius:5px;}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1rem;margin-bottom:1.5rem;}
        .stat-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.4rem;box-shadow:var(--sh);}
        .stat-label{font-size:.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.25rem;}
        .stat-value{font-size:1.5rem;font-weight:800;color:var(--navy);letter-spacing:-.03em;line-height:1.1;}
        .stat-value.green{color:var(--green);}.stat-value.red{color:var(--red);}.stat-value.amber{color:var(--amber);}
        .card{background:var(--white);border:1px solid var(--border);border-radius:14px;box-shadow:var(--sh);overflow:hidden;margin-bottom:1.5rem;}
        .card-header{padding:1.1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
        .card-title{font-weight:700;font-size:.95rem;color:var(--navy);}
        table.t{width:100%;border-collapse:collapse;}
        table.t th{text-align:left;font-size:.68rem;font-weight:700;color:var(--muted);padding:.85rem 1.5rem;background:var(--bg);border-bottom:1px solid var(--border);}
        table.t td{padding:.85rem 1.5rem;font-size:.84rem;color:var(--text2);border-bottom:1px solid var(--border);}
        .pill{font-size:.68rem;font-weight:700;padding:.2rem .6rem;border-radius:100px;text-transform:uppercase;}
        .pill-green{background:var(--green-bg);color:var(--green);}.pill-amber{background:var(--amber-bg);color:var(--amber);}.pill-red{background:var(--red-bg);color:var(--red);}.pill-blue{background:var(--blue-light);color:var(--blue);}.pill-gray{background:#f1f5f9;color:var(--muted);}
        .login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0b1f3a 0%,#142d52 100%);padding:2rem;}
        .login-card{background:white;border-radius:20px;padding:3rem 2.8rem;width:100%;max-width:420px;box-shadow:0 24px 48px rgba(0,0,0,.3);}
        .fi{width:100%;background:#f8fafc;border:1.5px solid var(--border);padding:.75rem 1rem;border-radius:9px;margin-bottom:1rem;}
        .btn-login{width:100%;background:linear-gradient(135deg,var(--blue),var(--navy));color:white;border:none;font-weight:700;padding:.9rem;border-radius:10px;cursor:pointer;}
        
        @media(max-width:900px){
          .sidebar{display:none;}
          .main{margin-left:0;}
          .stats-grid{grid-template-columns:1fr 1fr;}
        }
        `;

        // ── Components ────────────────────────────────────────────────────────
        function LoginPage({onLogin}){
          const [email,setEmail]=useState("");const [pass,setPass]=useState("");
          const sub=()=>{ if(email===ADMIN_USER&&pass===ADMIN_PASS) onLogin(); else alert("Wrong credentials"); };
          return(<div className="login-page"><div className="login-card">
            <h2 style={{marginBottom:"1rem"}}>Admin Login</h2>
            <input className="fi" type="email" placeholder="admin@worldweb.io" value={email} onChange={e=>setEmail(e.target.value)}/>
            <input className="fi" type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)}/>
            <button className="btn-login" onClick={sub}>Sign In</button>
          </div></div>);
        }

        function Overview(){
          const ST = getLiveStats();
          return(<div className="content">
            <div className="stats-grid">
              <div className="stat-card"><div className="stat-label">Total Users</div><div className="stat-value">{ST.totalUsers}</div></div>
              <div className="stat-card"><div className="stat-label">Deposits</div><div className="stat-value green">{fmtNGN(ST.totalDeposits)}</div></div>
              <div className="stat-card"><div className="stat-label">Withdrawn</div><div className="stat-value red">{fmtNGN(ST.totalWithdrawn)}</div></div>
            </div>
            <div className="card">
              <div className="card-header"><div className="card-title">Recent Transactions</div></div>
              <table className="t">
                <thead><tr><th>User</th><th>Type</th><th>Amount</th><th>Status</th></tr></thead>
                <tbody>
                  {Object.values(getStore().users).flatMap(u=>u.transactions).map((tx,i)=>(
                    <tr key={i}>
                      <td>User</td>
                      <td><span className="pill pill-blue">{tx.type}</span></td>
                      <td>{fmtNGN(tx.amount)}</td>
                      <td><span className="pill pill-green">{tx.status}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>);
        }

        function App(){
          const [loggedIn,setLoggedIn]=useState(false);
          useEffect(()=>{
            const s=document.createElement("style");
            s.textContent=CSS_STLYES;
            document.head.appendChild(s);
          },[]);

          if(!loggedIn) return <LoginPage onLogin={()=>setLoggedIn(true)}/>;

          return(<div className="app">
            <div className="sidebar">
              <div className="sb-logo"><div className="sb-logo-mark">W</div><div className="sb-logo-text">WorldWeb</div></div>
              <div className="sb-nav">
                <button className="sb-link active">Dashboard</button>
                <button className="sb-link">Users</button>
              </div>
              <div className="sb-foot">
                <button className="btn-logout" onClick={()=>setLoggedIn(false)}>Logout</button>
              </div>
            </div>
            <div className="main">
              <div className="topbar"><strong>Admin Overview</strong></div>
              <Overview />
            </div>
          </div>);
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
